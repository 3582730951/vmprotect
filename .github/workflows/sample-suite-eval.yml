              ios_source,
              Path(kv["ios_protected_o"]).resolve(),
          )
          if kv["ios_target"] != "arm64-apple-ios17.0-simulator":
              raise SystemExit("[FAIL] ios_target mismatch")
          if Path(kv["ios_isysroot"]).resolve() != ios_sdk:
              raise SystemExit("[FAIL] ios_isysroot mismatch")
          entries = [item for item in kv["ios_link_inputs"].split(";") if item]
          if len(entries) != 3:
              raise SystemExit("[FAIL] unexpected link input count for ios_link_inputs")
          protected_entry = Path(entries[0])
          helper_entry = Path(entries[1])
          runtime_entry = Path(entries[2])
          for label, entry in [("ios_protected_link_input", protected_entry), ("ios_helper_link_input", helper_entry), ("ios_runtime_link_input", runtime_entry)]:
              if not entry.is_absolute() or not entry.exists():
                  raise SystemExit(f"[FAIL] {label} path invalid")
              assert_under(entry, output_root, label)
          if protected_entry.resolve() != Path(kv["ios_protected_o"]).resolve():
              raise SystemExit("[FAIL] ios protected link input mismatch")
          if helper_entry.resolve() != Path(kv["ios_user_helper_o"]).resolve():
