          ios_runtime_sidecar = Path(kv["ios_user_runtime_compile_command"])
          assert_under(ios_runtime_sidecar, commands_root, "ios_user_runtime_compile_command")
          ios_runtime_text = ios_runtime_sidecar.read_text(encoding="ascii")
          if has_forbidden_linker_controls(ios_runtime_text):
              raise SystemExit("[FAIL] sidecar is not fully expanded: ios_user_runtime_compile_command")
          if str(Path(kv["ios_user_runtime_o"]).resolve()) not in ios_runtime_text:
              raise SystemExit("[FAIL] sidecar missing required token: ios_user_runtime_compile_command")
          assert_command_driver_path_matches_expected(
              ios_runtime_text,
              "ios_user_runtime_compile_command",
              Path(kv["ios_target_compiler_path"]),
              "[FAIL] ios_user_runtime_compile_command missing target compiler path",
          )
          if str(runtime_source) not in ios_runtime_text or str(shared_include) not in ios_runtime_text or str(runtime_include) not in ios_runtime_text:
              raise SystemExit("[FAIL] ios_user_runtime_compile_command missing source/include roots")
          if "-target arm64-apple-ios17.0-simulator" not in ios_runtime_text:
              raise SystemExit("[FAIL] ios_user_runtime_compile_command missing target")
          if "-std=c++20" not in ios_runtime_text or "-fno-exceptions" not in ios_runtime_text or "-fno-rtti" not in ios_runtime_text:
              raise SystemExit("[FAIL] ios_user_runtime_compile_command missing language/runtime flags")
          if "-fPIC" not in ios_runtime_text:
              raise SystemExit("[FAIL] ios_user_runtime_compile_command missing -fPIC")
          assert_flag_path_matches_expected(ios_runtime_text, "ios_user_runtime_compile_command", "-isysroot", Path(kv["ios_isysroot"]), "[FAIL] ios_user_runtime_compile_command missing isysroot")
          protected_compile_sidecar = Path(kv["ios_protected_compile_command"])
          assert_under(protected_compile_sidecar, commands_root, "ios_protected_compile_command")
          protected_compile_text = protected_compile_sidecar.read_text(encoding="ascii")
          if has_forbidden_linker_controls(protected_compile_text):
              raise SystemExit("[FAIL] ios_protected_compile_command is not fully expanded")
          compiler_path = assert_wrapper_option_path_matches_expected(
              protected_compile_text,
