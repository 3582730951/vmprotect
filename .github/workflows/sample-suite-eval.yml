name: sample-suite-eval

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - core/tests/sample_suite/**
      - core/tools/sample_suite/**
      - core/tools/redteam_harness.py
      - core/tools/redteam_runtime_probe.py
      - core/tools/redteam_perf_compare.py
      - core/tools/redteam_perf_smoke_collect.py
      - core/tools/redteam_host_probe.cpp
      - core/tools/lexical_anchor_denylist.txt
      - core/runtime/**
      - core/include/contracts/**
      - core/passes/**
      - core/wrapper/**
      - core/post_link_mutator/**
      - core/dex_toolchain/**
      - core/script_guard/**
      - core/tools/artifact_audit.py
      - .github/workflows/sample-suite-eval.yml

jobs:
  build-linux-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Build Tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang-18 \
            lld-18 \
            llvm-18 \
            llvm-18-dev \
            llvm-18-tools \
            binutils \
            curl \
            unzip \
            ca-certificates \
            file \
            python3 \
            cmake \
            ninja-build
          echo "/usr/lib/llvm-18/bin" >> "${GITHUB_PATH}"

      - name: Install Android SDK Build Tools + NDK
        shell: bash
        run: |
          set -euo pipefail
          ANDROID_SDK_ROOT="${RUNNER_TEMP}/android-sdk"
          NDK_VERSION="26.3.11579264"
          CMDLINE_TOOLS_ZIP="${RUNNER_TEMP}/android-commandline-tools.zip"

          mkdir -p "${ANDROID_SDK_ROOT}/cmdline-tools"
          curl -fsSL \
            https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip \
            -o "${CMDLINE_TOOLS_ZIP}"
          unzip -q "${CMDLINE_TOOLS_ZIP}" -d "${ANDROID_SDK_ROOT}/cmdline-tools"
          mv "${ANDROID_SDK_ROOT}/cmdline-tools/cmdline-tools" "${ANDROID_SDK_ROOT}/cmdline-tools/latest"

          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}" >> "${GITHUB_ENV}"
          echo "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin" >> "${GITHUB_PATH}"

          set +o pipefail
          yes | "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" \
            --sdk_root="${ANDROID_SDK_ROOT}" --licenses >/dev/null
          set -o pipefail
          "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" \
            --sdk_root="${ANDROID_SDK_ROOT}" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;${NDK_VERSION}"

      - name: Preflight Linux Android Environment Exports
        shell: bash
        run: |
          set -euo pipefail
          echo "EIPPF_HOST_LLVM_ROOT=/usr/lib/llvm-18" >> "${GITHUB_ENV}"
          echo "LLVM_DIR=/usr/lib/llvm-18/lib/cmake/llvm" >> "${GITHUB_ENV}"
          echo "EIPPF_ANDROID_NDK_VERSION=26.3.11579264" >> "${GITHUB_ENV}"
          echo "EIPPF_ANDROID_NDK_ROOT=${ANDROID_SDK_ROOT}/ndk/26.3.11579264" >> "${GITHUB_ENV}"
          echo "EIPPF_CLANG=clang-18" >> "${GITHUB_ENV}"
          echo "EIPPF_CLANGXX=clang++-18" >> "${GITHUB_ENV}"

      - name: Build Linux Android Samples
        shell: bash
        run: |
          set -euo pipefail
          chmod +x "${GITHUB_WORKSPACE}/core/tools/sample_suite/build_linux_android.sh"
          "${GITHUB_WORKSPACE}/core/tools/sample_suite/build_linux_android.sh" \
            "${GITHUB_WORKSPACE}/sample_suite_inputs"

      - name: Validate Linux Android Toolchain Report
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import os
          import re
          import shlex

          report = Path("sample_suite_inputs/toolchain_reports/linux_android.txt")
          if not report.is_file():
              raise SystemExit(f"[FAIL] missing report: {report}")

          kv = {}
          for raw in report.read_text(encoding="ascii").splitlines():
              parts = raw.split("=", 1)
              if len(parts) != 2:
                  raise SystemExit(f"[FAIL] malformed report line: {raw}")
              key, value = parts
              if key in kv:
                  raise SystemExit(f"[FAIL] duplicate key: {key}")
              kv[key] = value

          required = [
              "platform", "android_target_source", "llvm_dir", "android_ndk_root",
              "host_compiler_path", "host_compiler_version_first_line",
              "android_target_compiler_path", "android_target_compiler_version_first_line",
              "plugin_path", "suite_summary", "linux_user_helper_o", "linux_user_runtime_o",
              "linux_kernel_helper_o", "android_user_helper_o", "android_user_runtime_o",
              "android_kernel_helper_o",
              "android_so_protected_o", "android_ko_protected_o",
              "plugin_build_command",
              "linux_user_helper_compile_command", "linux_user_runtime_compile_command",
              "linux_kernel_helper_compile_command", "android_user_helper_compile_command",
              "android_user_runtime_compile_command", "android_kernel_helper_compile_command",
              "android_so_protected_compile_command", "android_ko_protected_compile_command",
              "linux_elf_link_inputs", "linux_so_link_inputs", "linux_ko_link_inputs",
              "android_so_link_inputs", "android_ko_link_inputs", "linux_elf_link_command",
              "linux_so_link_command", "linux_ko_link_command", "android_so_link_command",
              "android_ko_link_command", "android_so_link_driver_path", "android_ko_link_driver_path",
              "linux_ko_link_flags",
              "android_ko_link_flags",
          ]
          for key in required:
              if key not in kv:
                  raise SystemExit(f"[FAIL] missing key: {key}")
          if set(kv) != set(required):
              raise SystemExit("[FAIL] key set mismatch")
          if kv["platform"] != "linux_android":
              raise SystemExit("[FAIL] platform mismatch")
          if kv["android_target_source"] != "android_ndk":
              raise SystemExit("[FAIL] android_target_source mismatch")

          for key, value in kv.items():
              if key in {"platform", "android_target_source", "linux_ko_link_flags", "android_ko_link_flags", "android_so_link_inputs", "android_ko_link_inputs"} or key.endswith("_version_first_line"):
                  continue
              if not Path(value).is_absolute():
                  raise SystemExit(f"[FAIL] non-absolute path for {key}")
              if not Path(value).exists():
                  raise SystemExit(f"[FAIL] missing path for {key}")

          if os.environ["EIPPF_HOST_LLVM_ROOT"] != "/usr/lib/llvm-18":
              raise SystemExit("[FAIL] EIPPF_HOST_LLVM_ROOT mismatch")
          if os.environ["LLVM_DIR"] != "/usr/lib/llvm-18/lib/cmake/llvm":
              raise SystemExit("[FAIL] LLVM_DIR mismatch")
          if os.environ["EIPPF_ANDROID_NDK_VERSION"] != "26.3.11579264":
              raise SystemExit("[FAIL] EIPPF_ANDROID_NDK_VERSION mismatch")
          expected_ndk_root = Path(os.environ["ANDROID_SDK_ROOT"]).resolve() / "ndk" / os.environ["EIPPF_ANDROID_NDK_VERSION"]
          if Path(os.environ["EIPPF_ANDROID_NDK_ROOT"]).resolve() != expected_ndk_root:
              raise SystemExit("[FAIL] EIPPF_ANDROID_NDK_ROOT mismatch")

          host_root = Path(os.environ["EIPPF_HOST_LLVM_ROOT"]).resolve()
          output_root = (Path.cwd() / "sample_suite_inputs").resolve()
          commands_root = (output_root / "toolchain_reports" / "commands").resolve()
          expected_llvm_dir = Path(os.environ["LLVM_DIR"]).resolve()
          ndk_root = Path(os.environ["EIPPF_ANDROID_NDK_ROOT"]).resolve()
          ndk_bin_root = ndk_root / "toolchains" / "llvm" / "prebuilt" / "linux-x86_64" / "bin"
          android_sysroot = ndk_root / "toolchains" / "llvm" / "prebuilt" / "linux-x86_64" / "sysroot"
          repo_root = Path.cwd().resolve()
          wrapper_path = repo_root / "core" / "wrapper" / "eippf_cc.py"
          helper_source = repo_root / "core" / "runtime" / "src" / "string_token_runtime.cpp"
          runtime_source = repo_root / "core" / "runtime" / "src" / "EippfRuntime.cpp"
          shared_include = repo_root / "core" / "include"
          runtime_include = repo_root / "core" / "runtime" / "include"
          linux_elf_source = repo_root / "core" / "tests" / "sample_suite" / "sources" / "linux" / "linux_elf_main.c"
          linux_so_source = repo_root / "core" / "tests" / "sample_suite" / "sources" / "linux" / "linux_so.c"
          linux_ko_source = repo_root / "core" / "tests" / "sample_suite" / "sources" / "kernel" / "linux_module.c"
          android_so_source = repo_root / "core" / "tests" / "sample_suite" / "sources" / "android" / "android_so.c"
          android_ko_source = repo_root / "core" / "tests" / "sample_suite" / "sources" / "kernel" / "android_module.c"
          if not expected_llvm_dir.joinpath("LLVMConfig.cmake").is_file():
              raise SystemExit("[FAIL] LLVMConfig.cmake missing")
          if not android_sysroot.is_dir():
              raise SystemExit("[FAIL] Android sysroot missing")

          def assert_under(path: Path, root: Path, label: str) -> None:
              resolved = path.resolve()
              root_resolved = root.resolve()
              try:
                  resolved.relative_to(root_resolved)
              except ValueError as exc:
                  raise SystemExit(f"[FAIL] {label} escaped allowed root") from exc

          def has_forbidden_linker_controls(text: str) -> bool:
              tokens = shlex.split(text, posix=True)
              for index, token in enumerate(tokens):
                  if token.startswith("@"):
                      return True
                  if token in {"-T", "--script"}:
                      return True
                  if token.startswith("-T") or token.startswith("--script="):
                      return True
                  if token.startswith("-Wl,@") or token == "-Wl,-T" or token.startswith("-Wl,-T") or token == "-Wl,--script" or token.startswith("-Wl,--script"):
                      return True
                  if token == "-Xlinker" and index + 1 < len(tokens):
                      nxt = tokens[index + 1]
                      if nxt in {"-T", "--script"} or nxt.startswith("-T") or nxt.startswith("--script="):
                          return True
                  if token.startswith("-Xlinker=-T") or token.startswith("-Xlinker=--script"):
                      return True
              return False

          def explicit_object_archive_inputs(text: str) -> list[Path]:
              inputs: list[Path] = []
              for token in shlex.split(text, posix=True):
                  if re.search(r"\.(?:o|obj|a|lib)$", token):
                      path = Path(token)
                      if not path.is_absolute():
                          path = (Path.cwd() / path).resolve()
                      else:
                          path = path.resolve()
                      inputs.append(path)
              return inputs

          def command_payload_tokens(text: str) -> list[str]:
              tokens = shlex.split(text, posix=True)
              if "--" in tokens:
                  return tokens[tokens.index("--") + 1 :]
              return tokens

          def contains_token(text: str, target: str) -> bool:
              return any(token == target for token in command_payload_tokens(text))

          def has_explicit_pie_controls(text: str) -> bool:
              tokens = command_payload_tokens(text)
              for index, token in enumerate(tokens):
                  if token in {"-pie", "--pie", "-Wl,-pie", "-Xlinker=-pie"}:
                      return True
                  if token == "-Xlinker" and index + 1 < len(tokens) and tokens[index + 1] == "-pie":
                      return True
              return False

          def enforce_link_language_token_state_machine(
              command_text: str,
              command_key: str,
              source_path: Path,
              helper_path: Path,
          ) -> None:
              tokens = command_payload_tokens(command_text)
              source_token = str(source_path.resolve())
              helper_token = str(helper_path.resolve())
              explicit_language: str | None = None
              seen_x_c = False
              seen_source_after_x_c = False
              seen_x_none = False

              index = 0
              while index < len(tokens):
                  token = tokens[index]
                  language: str | None = None
                  if token == "-x":
                      if index + 1 >= len(tokens):
                          raise SystemExit(f"[FAIL] malformed -x token in {command_key}")
                      language = tokens[index + 1]
                      index += 2
                  elif token.startswith("-x") and len(token) > 2:
                      language = token[2:]
                      index += 1
                  else:
                      index += 1

                  if language is not None:
                      explicit_language = language
                      if language == "c":
                          seen_x_c = True
                      if language == "none":
                          seen_x_none = True
                      continue

                  if token == source_token:
                      if not seen_x_c:
                          raise SystemExit(f"[FAIL] source token must follow -x c in {command_key}")
                      seen_source_after_x_c = True

                  is_object_or_archive = re.search(r"\.(?:o|obj|a|lib)$", token) is not None
                  if is_object_or_archive and explicit_language not in {None, "none"}:
                      raise SystemExit(f"[FAIL] object/archive token under -x {explicit_language} in {command_key}: {token}")

                  if token == helper_token and not seen_x_none:
                      raise SystemExit(f"[FAIL] helper input requires -x none before it in {command_key}")

              if not seen_x_c:
                  raise SystemExit(f"[FAIL] missing -x c in {command_key}")
              if not seen_source_after_x_c:
                  raise SystemExit(f"[FAIL] missing source token after -x c in {command_key}")

          def enforce_compile_only_language_token_state_machine(
              command_text: str,
              command_key: str,
              source_path: Path,
              output_path: Path,
          ) -> None:
              tokens = command_payload_tokens(command_text)
              source_token = str(source_path.resolve())
              output_token = str(output_path.resolve())
              explicit_language: str | None = None
              seen_x_c = False
              seen_source_after_x_c = False
              seen_compile_only = False
              seen_output = False
              pending_source_after_x_c = False

              index = 0
              while index < len(tokens):
                  token = tokens[index]
                  if pending_source_after_x_c:
                      if token != source_token:
                          raise SystemExit(f"[FAIL] source token must immediately follow -x c in {command_key}")
                      seen_source_after_x_c = True
                      pending_source_after_x_c = False
                      index += 1
                      continue
                  if token == "-x":
                      if index + 1 >= len(tokens):
                          raise SystemExit(f"[FAIL] malformed -x token in {command_key}")
                      explicit_language = tokens[index + 1]
                      if explicit_language == "c":
                          seen_x_c = True
                          pending_source_after_x_c = True
                      index += 2
                      continue
                  if token.startswith("-x") and len(token) > 2:
                      explicit_language = token[2:]
                      if explicit_language == "c":
                          seen_x_c = True
                          pending_source_after_x_c = True
                      index += 1
                      continue
                  if token == "-c":
                      seen_compile_only = True
                      index += 1
                      continue
                  if token == "-o":
                      if index + 1 >= len(tokens):
                          raise SystemExit(f"[FAIL] malformed -o token in {command_key}")
                      output_value = tokens[index + 1]
                      if output_value != output_token:
                          raise SystemExit(f"[FAIL] unexpected output path in {command_key}")
                      seen_output = True
                      index += 2
                      continue
                  if token.startswith("-o") and len(token) > 2:
                      output_value = token[2:]
                      if output_value != output_token:
                          raise SystemExit(f"[FAIL] unexpected output path in {command_key}")
                      seen_output = True
                      index += 1
                      continue
                  if token == source_token:
                      if not seen_x_c:
                          raise SystemExit(f"[FAIL] source token must follow -x c in {command_key}")
                      seen_source_after_x_c = True
                      index += 1
                      continue
                  is_object_or_archive = re.search(r"\.(?:o|obj|a|lib)$", token) is not None
                  if is_object_or_archive and explicit_language not in {None, "none"}:
                      raise SystemExit(f"[FAIL] object/archive token under -x {explicit_language} in {command_key}: {token}")
                  index += 1

              if not seen_compile_only:
                  raise SystemExit(f"[FAIL] missing -c in {command_key}")
              if not seen_x_c:
                  raise SystemExit(f"[FAIL] missing -x c in {command_key}")
              if not seen_source_after_x_c:
                  raise SystemExit(f"[FAIL] missing source token after -x c in {command_key}")
              if pending_source_after_x_c:
                  raise SystemExit(f"[FAIL] missing immediate source token after -x c in {command_key}")
              if not seen_output:
                  raise SystemExit(f"[FAIL] missing -o output in {command_key}")

          host_compiler = Path(kv["host_compiler_path"]).resolve()
          android_compiler = Path(kv["android_target_compiler_path"]).resolve()
          android_so_link_driver = Path(kv["android_so_link_driver_path"]).resolve()
          android_link_driver = Path(kv["android_ko_link_driver_path"]).resolve()
          assert_under(host_compiler, host_root / "bin", "host_compiler")
          if Path(kv["llvm_dir"]).resolve() != expected_llvm_dir:
              raise SystemExit("[FAIL] llvm_dir provenance mismatch")
          if Path(kv["android_ndk_root"]).resolve() != ndk_root:
              raise SystemExit("[FAIL] android_ndk_root mismatch")
          if "clang version 18" not in kv["host_compiler_version_first_line"]:
              raise SystemExit("[FAIL] host compiler version mismatch")
          assert_under(android_compiler, ndk_bin_root, "android_target_compiler")
          assert_under(android_so_link_driver, ndk_bin_root, "android_so_link_driver")
          assert_under(android_link_driver, ndk_bin_root, "android_ko_link_driver")
          if Path(kv["host_compiler_path"]).name not in {"clang++", "clang++-18"}:
              raise SystemExit("[FAIL] host_compiler_path mismatch")
          if Path(kv["android_target_compiler_path"]).name != "aarch64-linux-android24-clang++":
              raise SystemExit("[FAIL] android_target_compiler_path mismatch")
          if Path(kv["android_so_link_driver_path"]).name != "aarch64-linux-android24-clang++":
              raise SystemExit("[FAIL] android_so_link_driver_path mismatch")
          if Path(kv["android_ko_link_driver_path"]).name != "aarch64-linux-android24-clang++":
              raise SystemExit("[FAIL] android_ko_link_driver_path mismatch")
          if android_so_link_driver != android_compiler:
              raise SystemExit("[FAIL] android_so_link_driver_path provenance mismatch")
          if android_link_driver != android_compiler:
              raise SystemExit("[FAIL] android_ko_link_driver_path provenance mismatch")
          if kv["linux_ko_link_flags"] != "-nostdlib;-no-pie;-fuse-ld=lld;-Wl,-r":
              raise SystemExit("[FAIL] linux_ko_link_flags mismatch")
          if kv["android_ko_link_flags"] != "--target=aarch64-linux-android24;-nostdlib;-no-pie;-fuse-ld=lld;-Wl,-r":
              raise SystemExit("[FAIL] android_ko_link_flags mismatch")
          assert_under(Path(kv["plugin_path"]), output_root, "plugin_path")
          if Path(kv["plugin_path"]).name != "eippf_protection_suite_pass.so":
              raise SystemExit("[FAIL] plugin_path mismatch")
          if kv["suite_summary"] != "ProtectionAnchor,StringProtection,IATMinimization,MBAObfuscation,CFFObfuscation":
              raise SystemExit("[FAIL] suite_summary mismatch")
          assert_under(Path(kv["linux_user_helper_o"]), output_root, "linux_user_helper_o")
          if Path(kv["linux_user_helper_o"]).name != "string_token_runtime.linux.user.o":
              raise SystemExit("[FAIL] linux_user_helper_o mismatch")
          assert_under(Path(kv["linux_user_runtime_o"]), output_root, "linux_user_runtime_o")
          if Path(kv["linux_user_runtime_o"]).name != "runtime_core.linux.user.o":
              raise SystemExit("[FAIL] linux_user_runtime_o mismatch")
          assert_under(Path(kv["linux_kernel_helper_o"]), output_root, "linux_kernel_helper_o")
          if Path(kv["linux_kernel_helper_o"]).name != "string_token_runtime.linux.ko.o":
              raise SystemExit("[FAIL] linux_kernel_helper_o mismatch")
          assert_under(Path(kv["android_user_helper_o"]), output_root, "android_user_helper_o")
          if Path(kv["android_user_helper_o"]).name != "string_token_runtime.android.user.o":
              raise SystemExit("[FAIL] android_user_helper_o mismatch")
          assert_under(Path(kv["android_user_runtime_o"]), output_root, "android_user_runtime_o")
          if Path(kv["android_user_runtime_o"]).name != "runtime_core.android.user.o":
              raise SystemExit("[FAIL] android_user_runtime_o mismatch")
          assert_under(Path(kv["android_kernel_helper_o"]), output_root, "android_kernel_helper_o")
          if Path(kv["android_kernel_helper_o"]).name != "string_token_runtime.android.ko.o":
              raise SystemExit("[FAIL] android_kernel_helper_o mismatch")
          assert_under(Path(kv["android_so_protected_o"]), output_root, "android_so_protected_o")
          if Path(kv["android_so_protected_o"]).name != "sample_android_so.protected.o":
              raise SystemExit("[FAIL] android_so_protected_o mismatch")
          assert_under(Path(kv["android_ko_protected_o"]), output_root, "android_ko_protected_o")
          if Path(kv["android_ko_protected_o"]).name != "sample_android_ko.protected.o":
              raise SystemExit("[FAIL] android_ko_protected_o mismatch")

          def check_sidecar(key: str, compiler_path: Path, required_tokens: list[str]) -> None:
              sidecar = Path(kv[key])
              assert_under(sidecar, commands_root, key)
              text = sidecar.read_text(encoding="ascii")
              if has_forbidden_linker_controls(text):
                  raise SystemExit(f"[FAIL] sidecar is not fully expanded: {key}")
              if str(compiler_path.resolve()) not in text:
                  raise SystemExit(f"[FAIL] sidecar missing compiler path: {key}")
              for token in required_tokens:
                  if token not in text:
                      raise SystemExit(f"[FAIL] sidecar missing required token: {key}: {token}")

          check_sidecar("plugin_build_command", host_compiler, [str(expected_llvm_dir)])
          check_sidecar("linux_user_helper_compile_command", host_compiler, [str(helper_source), str(shared_include), str(runtime_include), "-std=c++20", "-fno-exceptions", "-fno-rtti", "-fPIC", str(Path(kv["linux_user_helper_o"]).resolve())])
          check_sidecar("linux_user_runtime_compile_command", host_compiler, [str(runtime_source), str(shared_include), str(runtime_include), "-std=c++20", "-fno-exceptions", "-fno-rtti", "-fPIC", str(Path(kv["linux_user_runtime_o"]).resolve())])
          check_sidecar("linux_kernel_helper_compile_command", host_compiler, [str(helper_source), str(shared_include), str(runtime_include), "-std=c++20", "-fno-exceptions", "-fno-rtti", "-ffreestanding", "-fno-builtin", "-fno-stack-protector", "-fno-asynchronous-unwind-tables", "-fvisibility=hidden", str(Path(kv["linux_kernel_helper_o"]).resolve())])
          check_sidecar("android_user_helper_compile_command", android_compiler, [str(helper_source), str(shared_include), str(runtime_include), str(android_sysroot), "--target=aarch64-linux-android24", "-std=c++20", "-fno-exceptions", "-fno-rtti", "-fPIC", str(Path(kv["android_user_helper_o"]).resolve())])
          check_sidecar("android_user_runtime_compile_command", android_compiler, [str(runtime_source), str(shared_include), str(runtime_include), str(android_sysroot), "--target=aarch64-linux-android24", "-std=c++20", "-fno-exceptions", "-fno-rtti", "-fPIC", str(Path(kv["android_user_runtime_o"]).resolve())])
          check_sidecar("android_kernel_helper_compile_command", android_compiler, [str(helper_source), str(shared_include), str(runtime_include), str(android_sysroot), "--target=aarch64-linux-android24", "-std=c++20", "-fno-exceptions", "-fno-rtti", "-ffreestanding", "-fno-builtin", "-fno-stack-protector", "-fno-asynchronous-unwind-tables", "-fvisibility=hidden", str(Path(kv["android_kernel_helper_o"]).resolve())])
          check_sidecar("android_so_protected_compile_command", host_compiler, [str(android_so_source), str(android_sysroot), "--target=aarch64-linux-android24", "-x c", "-c", str(Path(kv["android_so_protected_o"]).resolve())])
          check_sidecar("android_ko_protected_compile_command", host_compiler, [str(android_ko_source), str(android_sysroot), "--target=aarch64-linux-android24", "-x c", "-c", str(Path(kv["android_ko_protected_o"]).resolve())])

          for command_key, source_path, output_key in [
              ("android_so_protected_compile_command", android_so_source, "android_so_protected_o"),
              ("android_ko_protected_compile_command", android_ko_source, "android_ko_protected_o"),
          ]:
              command_text = Path(kv[command_key]).read_text(encoding="ascii")
              if (
                  str(Path(kv["android_user_helper_o"]).resolve()) in command_text
                  or str(Path(kv["android_user_runtime_o"]).resolve()) in command_text
                  or str(Path(kv["android_kernel_helper_o"]).resolve()) in command_text
              ):
                  raise SystemExit(f"[FAIL] protected compile command contains runtime/helper object: {command_key}")
              if "-shared" in command_text:
                  raise SystemExit(f"[FAIL] protected compile command contains -shared: {command_key}")
              if "-Wl,-r" in command_text:
                  raise SystemExit(f"[FAIL] protected compile command contains -Wl,-r: {command_key}")
              enforce_compile_only_language_token_state_machine(
                  command_text,
                  command_key,
                  source_path,
                  Path(kv[output_key]),
              )

          def check_single_input(key: str, expected_name: str, command_key: str, driver_path: Path, source_path: Path) -> None:
              entries = [item for item in kv[key].split(";") if item]
              if len(entries) != 1:
                  raise SystemExit(f"[FAIL] unexpected link input count for {key}")
              entry = Path(entries[0])
              if not entry.is_absolute():
                  raise SystemExit(f"[FAIL] non-absolute link input for {key}")
              if not entry.exists():
                  raise SystemExit(f"[FAIL] missing link input for {key}")
              assert_under(entry, output_root, key)
              if entry.name != expected_name:
                  raise SystemExit(f"[FAIL] link input mismatch for {key}")
              if "eippf_string_token_runtime." in entry.name:
                  raise SystemExit(f"[FAIL] legacy runtime archive leaked into {key}")
              command_path = Path(kv[command_key])
              assert_under(command_path, commands_root, command_key)
              command_text = command_path.read_text(encoding="ascii")
              if has_forbidden_linker_controls(command_text):
                  raise SystemExit(f"[FAIL] link command is not fully expanded: {command_key}")
              if str(driver_path.resolve()) not in command_text:
                  raise SystemExit(f"[FAIL] link command missing driver path: {command_key}")
              if str(entry.resolve()) not in command_text:
                  raise SystemExit(f"[FAIL] link command missing helper input for {command_key}")
              if "eippf_string_token_runtime." in command_text:
                  raise SystemExit(f"[FAIL] legacy runtime archive leaked into {command_key}")
              explicit_inputs = explicit_object_archive_inputs(command_text)
              if explicit_inputs.count(entry.resolve()) != 1:
                  raise SystemExit(f"[FAIL] explicit helper input set mismatch for {command_key}")
              unexpected = sorted({str(path) for path in explicit_inputs if path != entry.resolve()})
              if unexpected:
                  raise SystemExit(f"[FAIL] unexpected explicit object/archive input for {command_key}: {';'.join(unexpected)}")
              enforce_link_language_token_state_machine(command_text, command_key, source_path, entry.resolve())

          def check_linux_dual_input_link(
              key: str,
              helper_key: str,
              runtime_key: str,
              command_key: str,
              driver_path: Path,
              source_path: Path,
          ) -> None:
              entries = [item for item in kv[key].split(";") if item]
              if len(entries) != 2:
                  raise SystemExit(f"[FAIL] unexpected link input count for {key}")
              helper_entry = Path(entries[0])
              runtime_entry = Path(entries[1])
              for entry, label in [(helper_entry, "helper"), (runtime_entry, "runtime")]:
                  if not entry.is_absolute():
                      raise SystemExit(f"[FAIL] non-absolute {label} link input for {key}")
                  if not entry.exists():
                      raise SystemExit(f"[FAIL] missing {label} link input for {key}")
                  assert_under(entry, output_root, key)
              if helper_entry.resolve() != Path(kv[helper_key]).resolve():
                  raise SystemExit(f"[FAIL] helper link input mismatch for {key}")
              if runtime_entry.resolve() != Path(kv[runtime_key]).resolve():
                  raise SystemExit(f"[FAIL] runtime link input mismatch for {key}")

              command_path = Path(kv[command_key])
              assert_under(command_path, commands_root, command_key)
              command_text = command_path.read_text(encoding="ascii")
              if has_forbidden_linker_controls(command_text):
                  raise SystemExit(f"[FAIL] link command is not fully expanded: {command_key}")
              if str(driver_path.resolve()) not in command_text:
                  raise SystemExit(f"[FAIL] link command missing driver path: {command_key}")
              if str(helper_entry.resolve()) not in command_text:
                  raise SystemExit(f"[FAIL] link command missing helper input for {command_key}")
              if str(runtime_entry.resolve()) not in command_text:
                  raise SystemExit(f"[FAIL] link command missing runtime input for {command_key}")
              if "eippf_string_token_runtime." in command_text:
                  raise SystemExit(f"[FAIL] legacy runtime archive leaked into {command_key}")

              explicit_inputs = explicit_object_archive_inputs(command_text)
              if len(explicit_inputs) != 2:
                  raise SystemExit(f"[FAIL] explicit input count mismatch for {command_key}")
              if explicit_inputs[0] != helper_entry.resolve():
                  raise SystemExit(f"[FAIL] explicit helper input order mismatch for {command_key}")
              if explicit_inputs[1] != runtime_entry.resolve():
                  raise SystemExit(f"[FAIL] explicit runtime input order mismatch for {command_key}")
              enforce_link_language_token_state_machine(command_text, command_key, source_path, helper_entry.resolve())

          def check_android_dual_input_link(
              key: str,
              protected_key: str,
              helper_key: str,
              command_key: str,
              driver_path: Path,
              source_path: Path,
          ) -> None:
              entries = [item for item in kv[key].split(";") if item]
              if len(entries) != 2:
                  raise SystemExit(f"[FAIL] unexpected link input count for {key}")
              protected_entry = Path(entries[0])
              helper_entry = Path(entries[1])
              for entry, label in [(protected_entry, "protected"), (helper_entry, "helper")]:
                  if not entry.is_absolute():
                      raise SystemExit(f"[FAIL] non-absolute {label} link input for {key}")
                  if not entry.exists():
                      raise SystemExit(f"[FAIL] missing {label} link input for {key}")
                  assert_under(entry, output_root, key)

              if protected_entry.resolve() != Path(kv[protected_key]).resolve():
                  raise SystemExit(f"[FAIL] protected link input mismatch for {key}")
              if helper_entry.resolve() != Path(kv[helper_key]).resolve():
                  raise SystemExit(f"[FAIL] helper link input mismatch for {key}")

              command_path = Path(kv[command_key])
              assert_under(command_path, commands_root, command_key)
              command_text = command_path.read_text(encoding="ascii")
              if has_forbidden_linker_controls(command_text):
                  raise SystemExit(f"[FAIL] link command is not fully expanded: {command_key}")
              if str(driver_path.resolve()) not in command_text:
                  raise SystemExit(f"[FAIL] link command missing driver path: {command_key}")
              if str(protected_entry.resolve()) not in command_text:
                  raise SystemExit(f"[FAIL] link command missing protected input for {command_key}")
              if str(helper_entry.resolve()) not in command_text:
                  raise SystemExit(f"[FAIL] link command missing helper input for {command_key}")
              if str(source_path.resolve()) in command_text:
                  raise SystemExit(f"[FAIL] link command contains source path for {command_key}")
              if str(wrapper_path.resolve()) in command_text:
                  raise SystemExit(f"[FAIL] link command contains wrapper path for {command_key}")
              if str(Path(kv["plugin_path"]).resolve()) in command_text:
                  raise SystemExit(f"[FAIL] link command contains pass plugin path for {command_key}")
              if "-fpass-plugin" in command_text:
                  raise SystemExit(f"[FAIL] link command contains pass plugin flag for {command_key}")

              explicit_inputs = explicit_object_archive_inputs(command_text)
              if len(explicit_inputs) != 2:
                  raise SystemExit(f"[FAIL] explicit input count mismatch for {command_key}")
              if explicit_inputs[0] != protected_entry.resolve():
                  raise SystemExit(f"[FAIL] explicit protected input order mismatch for {command_key}")
              if explicit_inputs[1] != helper_entry.resolve():
                  raise SystemExit(f"[FAIL] explicit helper input order mismatch for {command_key}")

          def check_android_triple_input_link(
              key: str,
              protected_key: str,
              helper_key: str,
              runtime_key: str,
              command_key: str,
              driver_path: Path,
              source_path: Path,
          ) -> None:
              entries = [item for item in kv[key].split(";") if item]
              if len(entries) != 3:
                  raise SystemExit(f"[FAIL] unexpected link input count for {key}")
              protected_entry = Path(entries[0])
              helper_entry = Path(entries[1])
              runtime_entry = Path(entries[2])
              for entry, label in [(protected_entry, "protected"), (helper_entry, "helper"), (runtime_entry, "runtime")]:
                  if not entry.is_absolute():
                      raise SystemExit(f"[FAIL] non-absolute {label} link input for {key}")
                  if not entry.exists():
                      raise SystemExit(f"[FAIL] missing {label} link input for {key}")
                  assert_under(entry, output_root, key)
              if protected_entry.resolve() != Path(kv[protected_key]).resolve():
                  raise SystemExit(f"[FAIL] protected link input mismatch for {key}")
              if helper_entry.resolve() != Path(kv[helper_key]).resolve():
                  raise SystemExit(f"[FAIL] helper link input mismatch for {key}")
              if runtime_entry.resolve() != Path(kv[runtime_key]).resolve():
                  raise SystemExit(f"[FAIL] runtime link input mismatch for {key}")

              command_path = Path(kv[command_key])
              assert_under(command_path, commands_root, command_key)
              command_text = command_path.read_text(encoding="ascii")
              if has_forbidden_linker_controls(command_text):
                  raise SystemExit(f"[FAIL] link command is not fully expanded: {command_key}")
              if str(driver_path.resolve()) not in command_text:
                  raise SystemExit(f"[FAIL] link command missing driver path: {command_key}")
              if str(protected_entry.resolve()) not in command_text:
                  raise SystemExit(f"[FAIL] link command missing protected input for {command_key}")
              if str(helper_entry.resolve()) not in command_text:
                  raise SystemExit(f"[FAIL] link command missing helper input for {command_key}")
              if str(runtime_entry.resolve()) not in command_text:
                  raise SystemExit(f"[FAIL] link command missing runtime input for {command_key}")
              if str(source_path.resolve()) in command_text:
                  raise SystemExit(f"[FAIL] link command contains source path for {command_key}")
              if str(wrapper_path.resolve()) in command_text:
                  raise SystemExit(f"[FAIL] link command contains wrapper path for {command_key}")
              if str(Path(kv["plugin_path"]).resolve()) in command_text:
                  raise SystemExit(f"[FAIL] link command contains pass plugin path for {command_key}")
              if "-fpass-plugin" in command_text:
                  raise SystemExit(f"[FAIL] link command contains pass plugin flag for {command_key}")

              explicit_inputs = explicit_object_archive_inputs(command_text)
              if len(explicit_inputs) != 3:
                  raise SystemExit(f"[FAIL] explicit input count mismatch for {command_key}")
              if explicit_inputs[0] != protected_entry.resolve():
                  raise SystemExit(f"[FAIL] explicit protected input order mismatch for {command_key}")
              if explicit_inputs[1] != helper_entry.resolve():
                  raise SystemExit(f"[FAIL] explicit helper input order mismatch for {command_key}")
              if explicit_inputs[2] != runtime_entry.resolve():
                  raise SystemExit(f"[FAIL] explicit runtime input order mismatch for {command_key}")

          check_linux_dual_input_link("linux_elf_link_inputs", "linux_user_helper_o", "linux_user_runtime_o", "linux_elf_link_command", host_compiler, linux_elf_source)
          check_linux_dual_input_link("linux_so_link_inputs", "linux_user_helper_o", "linux_user_runtime_o", "linux_so_link_command", host_compiler, linux_so_source)
          check_single_input("linux_ko_link_inputs", "string_token_runtime.linux.ko.o", "linux_ko_link_command", host_compiler, linux_ko_source)
          check_android_triple_input_link("android_so_link_inputs", "android_so_protected_o", "android_user_helper_o", "android_user_runtime_o", "android_so_link_command", android_so_link_driver, android_so_source)
          check_android_dual_input_link("android_ko_link_inputs", "android_ko_protected_o", "android_kernel_helper_o", "android_ko_link_command", android_link_driver, android_ko_source)
          if Path(kv["linux_elf_link_inputs"].split(";")[0]).resolve() != Path(kv["linux_user_helper_o"]).resolve():
              raise SystemExit("[FAIL] linux_elf link/helper binding mismatch")
          if Path(kv["linux_elf_link_inputs"].split(";")[1]).resolve() != Path(kv["linux_user_runtime_o"]).resolve():
              raise SystemExit("[FAIL] linux_elf link/runtime binding mismatch")
          if Path(kv["linux_so_link_inputs"].split(";")[0]).resolve() != Path(kv["linux_user_helper_o"]).resolve():
              raise SystemExit("[FAIL] linux_so link/helper binding mismatch")
          if Path(kv["linux_so_link_inputs"].split(";")[1]).resolve() != Path(kv["linux_user_runtime_o"]).resolve():
              raise SystemExit("[FAIL] linux_so link/runtime binding mismatch")
          if Path(kv["linux_ko_link_inputs"].split(";")[0]).resolve() != Path(kv["linux_kernel_helper_o"]).resolve():
              raise SystemExit("[FAIL] linux_ko link/helper binding mismatch")
          linux_ko_command = Path(kv["linux_ko_link_command"]).read_text(encoding="ascii")
          android_ko_command = Path(kv["android_ko_link_command"]).read_text(encoding="ascii")
          for token in ["-nostdlib", "-no-pie", "-fuse-ld=lld", "-Wl,-r"]:
              if not contains_token(linux_ko_command, token):
                  raise SystemExit(f"[FAIL] linux_ko command missing token: {token}")
          for token in ["--target=aarch64-linux-android24", "-nostdlib", "-no-pie", "-fuse-ld=lld", "-Wl,-r"]:
              if not contains_token(android_ko_command, token):
                  raise SystemExit(f"[FAIL] android_ko command missing token: {token}")
          if not contains_token(linux_ko_command, "-no-pie"):
              raise SystemExit("[FAIL] linux_ko command missing explicit -no-pie token")
          if not contains_token(android_ko_command, "-no-pie"):
              raise SystemExit("[FAIL] android_ko command missing explicit -no-pie token")
          if has_explicit_pie_controls(linux_ko_command):
              raise SystemExit("[FAIL] linux_ko command contains explicit PIE controls")
          if has_explicit_pie_controls(android_ko_command):
              raise SystemExit("[FAIL] android_ko command contains explicit PIE controls")

          no_no_pie_keys = [
              "linux_elf_link_command",
              "linux_so_link_command",
              "android_so_link_command",
              "plugin_build_command",
              "linux_user_helper_compile_command",
              "linux_user_runtime_compile_command",
              "linux_kernel_helper_compile_command",
              "android_user_helper_compile_command",
              "android_user_runtime_compile_command",
              "android_kernel_helper_compile_command",
          ]
          for key in no_no_pie_keys:
              text = Path(kv[key]).read_text(encoding="ascii")
              if contains_token(text, "-no-pie"):
                  raise SystemExit(f"[FAIL] unexpected -no-pie leakage in {key}")
          PY

      - name: Upload Linux Android Samples
        uses: actions/upload-artifact@v4
        with:
          name: sample-suite-linux-android
          path: sample_suite_inputs
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC Environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Pinned LLVM 19.1.7
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $llvmVersion = "19.1.7"
          $archiveName = "clang+llvm-$llvmVersion-x86_64-pc-windows-msvc.tar.xz"
          $downloadUrl = "https://github.com/llvm/llvm-project/releases/download/llvmorg-$llvmVersion/$archiveName"
          $stagingRoot = Join-Path $env:RUNNER_TEMP "llvm-install"
          $archivePath = Join-Path $env:RUNNER_TEMP $archiveName
          $extractRoot = Join-Path $stagingRoot "extract"
          $pinnedRoot = [System.IO.Path]::GetFullPath("C:\eippf\llvm19_1_7")
          if (Test-Path -LiteralPath $pinnedRoot) {
            Remove-Item -LiteralPath $pinnedRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Path $stagingRoot -Force | Out-Null
          New-Item -ItemType Directory -Path $extractRoot -Force | Out-Null
          Invoke-WebRequest -Uri $downloadUrl -OutFile $archivePath
          tar -xf $archivePath -C $extractRoot
          $payloadDir = Get-ChildItem -LiteralPath $extractRoot -Directory | Select-Object -First 1
          if ($null -eq $payloadDir) { throw "[FAIL] extracted LLVM archive is empty" }
          New-Item -ItemType Directory -Path (Split-Path -Parent $pinnedRoot) -Force | Out-Null
          Move-Item -LiteralPath $payloadDir.FullName -Destination $pinnedRoot
          if (!(Test-Path -LiteralPath (Join-Path $pinnedRoot "bin\\clang-cl.exe") -PathType Leaf)) {
            throw "[FAIL] pinned LLVM clang-cl.exe missing after extraction"
          }

      - name: Configure Pinned LLVM Contract
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $pinnedRoot = [System.IO.Path]::GetFullPath("C:\eippf\llvm19_1_7").TrimEnd('\')
          $llvmDir = Join-Path $pinnedRoot "lib\cmake\llvm"
          "LLVM_DIR=$llvmDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "EIPPF_ALLOWED_LLVM_DIR=$llvmDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "EIPPF_ALLOWED_LLVM_ROOT=$pinnedRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "EIPPF_WINDOWS_LLVM_SOURCE=pinned_llvm19_1_7_tarball" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "[INFO] Using deterministic LLVM contract root: $pinnedRoot"

      - name: Build Windows Samples
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          ./core/tools/sample_suite/build_windows.ps1 -OutputRoot "$PWD\sample_suite_inputs"

      - name: Validate Windows Toolchain Report
        shell: powershell
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"
          $hasLlvmDir = -not [string]::IsNullOrWhiteSpace($env:LLVM_DIR)
          $hasPinnedLlvmSource = -not [string]::IsNullOrWhiteSpace($env:EIPPF_WINDOWS_LLVM_SOURCE)
          if (-not [string]::IsNullOrWhiteSpace($env:EIPPF_VS_LLVM_DIR)) { throw "[FAIL] EIPPF_VS_LLVM_DIR must be unset" }
          if (-not $hasLlvmDir) { throw "[FAIL] LLVM_DIR must be set" }
          if (-not $hasPinnedLlvmSource -or $env:EIPPF_WINDOWS_LLVM_SOURCE -ne "pinned_llvm19_1_7_tarball") { throw "[FAIL] EIPPF_WINDOWS_LLVM_SOURCE mismatch" }
          $report = "sample_suite_inputs/toolchain_reports/windows.txt"
          if (!(Test-Path -LiteralPath $report -PathType Leaf)) { throw "[FAIL] missing report: $report" }
          $bytes = [System.IO.File]::ReadAllBytes($report)
          if ($bytes | Where-Object { $_ -gt 127 }) { throw "[FAIL] report is not ASCII" }
          $kv = @{}
          [System.Text.Encoding]::ASCII.GetString($bytes) -split "`r?`n" | Where-Object { $_ -ne "" } | ForEach-Object {
            $parts = $_ -split '=', 2
            if ($parts.Count -ne 2) { throw "[FAIL] malformed report line: $_" }
            if ($kv.ContainsKey($parts[0])) { throw "[FAIL] duplicate key: $($parts[0])" }
            $kv[$parts[0]] = $parts[1]
          }
          $required = @("platform","llvm_source","compiler_path","compiler_version_first_line","llvm_dir","plugin_path","suite_summary","helper_user_o","runtime_user_o","helper_kernel_o","plugin_build_command","helper_user_compile_command","runtime_user_compile_command","helper_kernel_compile_command","windows_exe_link_inputs","windows_dll_link_inputs","windows_sys_link_inputs","windows_exe_link_command","windows_dll_link_command","windows_sys_link_command")
          foreach ($key in $required) { if (-not $kv.ContainsKey($key)) { throw "[FAIL] missing key: $key" } }
          if (($kv.Keys | Sort-Object) -join ';' -ne ($required | Sort-Object) -join ';') { throw "[FAIL] key set mismatch" }
          if ($kv["platform"] -ne "windows") { throw "[FAIL] platform mismatch" }
          if ($kv["llvm_source"] -ne "pinned_llvm19_1_7_tarball") { throw "[FAIL] llvm_source mismatch" }
          foreach ($key in @("compiler_path","llvm_dir","plugin_path","helper_user_o","runtime_user_o","helper_kernel_o","plugin_build_command","helper_user_compile_command","runtime_user_compile_command","helper_kernel_compile_command","windows_exe_link_command","windows_dll_link_command","windows_sys_link_command")) {
            if (-not [System.IO.Path]::IsPathRooted($kv[$key])) { throw "[FAIL] non-absolute path for $key" }
            if (!(Test-Path -LiteralPath $kv[$key])) { throw "[FAIL] missing path for $key" }
          }
          $allowedRoot = Resolve-Path -LiteralPath $env:EIPPF_ALLOWED_LLVM_ROOT
          $outputRoot = Resolve-Path -LiteralPath (Join-Path $PWD "sample_suite_inputs")
          $commandsRoot = Resolve-Path -LiteralPath (Join-Path $PWD "sample_suite_inputs\\toolchain_reports\\commands")
          function Test-UnderRoot([string]$Child, [string]$Root) {
            $childFull = [System.IO.Path]::GetFullPath($Child)
            $rootFull = [System.IO.Path]::GetFullPath($Root).TrimEnd('\\')
            return $childFull.Equals($rootFull, [System.StringComparison]::OrdinalIgnoreCase) -or $childFull.StartsWith($rootFull + '\\', [System.StringComparison]::OrdinalIgnoreCase)
          }
          function Test-PathEquals([string]$Left, [string]$Right) {
            return [System.IO.Path]::GetFullPath($Left).TrimEnd('\').Equals([System.IO.Path]::GetFullPath($Right).TrimEnd('\'), [System.StringComparison]::OrdinalIgnoreCase)
          }
          function Get-CommandTokens([string]$Text) {
            $tokens = @()
            foreach ($match in [regex]::Matches($Text, '"[^"]*"|\S+')) {
              $token = $match.Value.Trim('"')
              if ($token) { $tokens += $token }
            }
            return @($tokens)
          }
          function Test-ForbiddenLinkerControls([string]$Text) {
            $tokens = @(Get-CommandTokens $Text)
            for ($i = 0; $i -lt $tokens.Count; $i++) {
              $token = $tokens[$i]
              if ($token.StartsWith("@")) { return $true }
              if ($token -eq "-T" -or $token -eq "--script") { return $true }
              if ($token -match '^\-T.+' -or $token -match '^\-\-script(?:=|,).+') { return $true }
              if ($token -match '^\-Wl,@' -or $token -match '^\-Wl,\-T(?:,|=)?.+' -or $token -eq "-Wl,-T" -or $token -match '^\-Wl,\-\-script(?:,|=)?.+' -or $token -eq "-Wl,--script") { return $true }
              if ($token -eq "-Xlinker" -and $i + 1 -lt $tokens.Count) {
                $next = $tokens[$i + 1]
                if ($next -eq "-T" -or $next -eq "--script" -or $next -match '^\-T.+' -or $next -match '^\-\-script(?:=|,)?.+') { return $true }
              }
              if ($token -match '^\-Xlinker=(\-T.*|\-\-script(?:=|,)?.*)$') { return $true }
            }
            return $false
          }
          function Get-ExplicitObjectArchiveInputs([string]$Text) {
            $values = @()
            foreach ($token in (Get-CommandTokens $Text)) {
              if ($token -match '\.(obj|o|a|lib)$') {
                if ([System.IO.Path]::IsPathRooted($token)) {
                  $values += [System.IO.Path]::GetFullPath($token)
                } else {
                  $values += [System.IO.Path]::GetFullPath((Join-Path $PWD $token))
                }
              }
            }
            return @($values | Sort-Object -Unique)
          }
          $compilerPathRaw = $kv["compiler_path"]
          if ([string]::IsNullOrWhiteSpace($compilerPathRaw)) { throw "[FAIL] compiler_path is empty" }
          if ($compilerPathRaw -match '\.\.') { throw "[FAIL] compiler_path contains parent traversal" }
          if (-not (Test-Path -LiteralPath $compilerPathRaw -PathType Leaf)) { throw "[FAIL] compiler_path is not a leaf file" }
          $compilerPath = (Resolve-Path -LiteralPath $compilerPathRaw).Path
          $compilerBaseName = [System.IO.Path]::GetFileName($compilerPath).ToLowerInvariant()
          if ($compilerBaseName -eq "cl.exe") { throw "[FAIL] cl.exe is forbidden for compiler_path" }
          if ($compilerBaseName -eq "clang.exe") { throw "[FAIL] clang.exe is forbidden for compiler_path" }
          if ($compilerBaseName -eq "clang++.exe") { throw "[FAIL] clang++.exe is forbidden for compiler_path" }
          if ($compilerBaseName.EndsWith(".bat") -or $compilerBaseName.EndsWith(".cmd") -or $compilerBaseName.EndsWith(".ps1")) { throw "[FAIL] script compiler launcher is forbidden" }
          if ($compilerBaseName -ne "clang-cl.exe") { throw "[FAIL] compiler_path basename mismatch" }
          $llvmDir = (Resolve-Path -LiteralPath $kv["llvm_dir"]).Path
          $repoRoot = (Resolve-Path -LiteralPath $PWD).Path
          $helperSource = [System.IO.Path]::GetFullPath((Join-Path $repoRoot "core\\runtime\\src\\string_token_runtime.cpp"))
          $runtimeSource = [System.IO.Path]::GetFullPath((Join-Path $repoRoot "core\\runtime\\src\\EippfRuntime.cpp"))
          $sharedInclude = [System.IO.Path]::GetFullPath((Join-Path $repoRoot "core\\include"))
          $runtimeInclude = [System.IO.Path]::GetFullPath((Join-Path $repoRoot "core\\runtime\\include"))
          $expectedCompilerRoot = Join-Path $allowedRoot.Path "bin"
          $expectedCompilerPath = [System.IO.Path]::GetFullPath((Join-Path $expectedCompilerRoot "clang-cl.exe")).TrimEnd('\')
          $normalizedCompilerPath = [System.IO.Path]::GetFullPath($compilerPath).TrimEnd('\')
          $compilerParent = Split-Path -Parent $compilerPath
          if (-not (Test-PathEquals $compilerParent $expectedCompilerRoot)) { throw "[FAIL] compiler provenance mismatch" }
          if (-not $normalizedCompilerPath.Equals($expectedCompilerPath, [System.StringComparison]::OrdinalIgnoreCase)) { throw "[FAIL] compiler_path exact provenance mismatch" }
          $expectedLlvmDir = [System.IO.Path]::GetFullPath((Join-Path $allowedRoot.Path "lib\\cmake\\llvm"))
          if (-not (Test-PathEquals $llvmDir $expectedLlvmDir)) { throw "[FAIL] llvm_dir provenance mismatch" }
          $vsLlvmBase = [System.IO.Path]::GetFullPath((Join-Path $env:VCINSTALLDIR "Tools\\Llvm")).TrimEnd('\')
          $allowedRootPath = [System.IO.Path]::GetFullPath($allowedRoot.Path).TrimEnd('\')
          $pinnedRootPath = [System.IO.Path]::GetFullPath("C:\\eippf\\llvm19_1_7").TrimEnd('\')
          $legacyRootPath = [System.IO.Path]::GetFullPath("C:\\eippf\\llvm18").TrimEnd('\')
          $isVsBundledRoot = $allowedRootPath.Equals($vsLlvmBase, [System.StringComparison]::OrdinalIgnoreCase) -or $allowedRootPath.StartsWith($vsLlvmBase + "\", [System.StringComparison]::OrdinalIgnoreCase)
          if (-not $allowedRootPath.Equals($pinnedRootPath, [System.StringComparison]::OrdinalIgnoreCase)) { throw "[FAIL] llvm_source/root mismatch for pinned_llvm19_1_7_tarball" }
          if ($isVsBundledRoot) { throw "[FAIL] pinned_llvm19_1_7_tarball cannot use VS bundled root" }
          if ($normalizedCompilerPath.StartsWith($vsLlvmBase + "\", [System.StringComparison]::OrdinalIgnoreCase) -or $normalizedCompilerPath.Equals($vsLlvmBase, [System.StringComparison]::OrdinalIgnoreCase)) { throw "[FAIL] compiler_path cannot point to VS bundled LLVM" }
          if ($normalizedCompilerPath.StartsWith($legacyRootPath + "\", [System.StringComparison]::OrdinalIgnoreCase) -or $normalizedCompilerPath.Equals($legacyRootPath, [System.StringComparison]::OrdinalIgnoreCase)) { throw "[FAIL] compiler_path cannot point to legacy llvm18 root" }
          $reportCompilerVersionFirstLine = $kv["compiler_version_first_line"].Trim()
          if ($reportCompilerVersionFirstLine -ne "clang version 19.1.7") { throw "[FAIL] compiler_version_first_line mismatch for pinned_llvm19_1_7_tarball" }
          $actualCompilerVersionFirstLine = (& $compilerPath --version 2>&1 | Select-Object -First 1).ToString().Trim()
          if ([string]::IsNullOrWhiteSpace($actualCompilerVersionFirstLine)) { throw "[FAIL] compiler_path --version did not return first line" }
          if ($actualCompilerVersionFirstLine -ne "clang version 19.1.7") { throw "[FAIL] compiler_path runtime version mismatch for pinned_llvm19_1_7_tarball" }
          if ($reportCompilerVersionFirstLine -ne $actualCompilerVersionFirstLine) { throw "[FAIL] report/runtime compiler version mismatch" }
          $cmakeCachePath = Join-Path $PWD "sample_suite_inputs\\_pass_plugin_build_windows\\CMakeCache.txt"
          if (-not (Test-Path -LiteralPath $cmakeCachePath -PathType Leaf)) { throw "[FAIL] missing CMakeCache.txt for compiler provenance proof" }
          $cmakeCacheLines = Get-Content -LiteralPath $cmakeCachePath -Encoding ASCII
          $cacheCompilerC = ($cmakeCacheLines | Where-Object { $_ -like "CMAKE_C_COMPILER:FILEPATH=*" } | Select-Object -Last 1)
          $cacheCompilerCxx = ($cmakeCacheLines | Where-Object { $_ -like "CMAKE_CXX_COMPILER:FILEPATH=*" } | Select-Object -Last 1)
          if ([string]::IsNullOrWhiteSpace($cacheCompilerC)) { throw "[FAIL] missing CMAKE_C_COMPILER in CMakeCache.txt" }
          if ([string]::IsNullOrWhiteSpace($cacheCompilerCxx)) { throw "[FAIL] missing CMAKE_CXX_COMPILER in CMakeCache.txt" }
          $cacheCompilerCPath = $cacheCompilerC.Substring("CMAKE_C_COMPILER:FILEPATH=".Length)
          $cacheCompilerCxxPath = $cacheCompilerCxx.Substring("CMAKE_CXX_COMPILER:FILEPATH=".Length)
          foreach ($cacheEntry in @($cacheCompilerCPath, $cacheCompilerCxxPath)) {
            if ([string]::IsNullOrWhiteSpace($cacheEntry)) { throw "[FAIL] empty compiler entry in CMakeCache.txt" }
            if ($cacheEntry -match '\.\.') { throw "[FAIL] CMakeCache compiler path contains parent traversal" }
            if (-not (Test-Path -LiteralPath $cacheEntry -PathType Leaf)) { throw "[FAIL] CMakeCache compiler path is not a leaf file" }
            $cacheCompilerPath = (Resolve-Path -LiteralPath $cacheEntry).Path
            $normalizedCacheCompilerPath = [System.IO.Path]::GetFullPath($cacheCompilerPath).TrimEnd('\')
            if (-not $normalizedCacheCompilerPath.Equals($expectedCompilerPath, [System.StringComparison]::OrdinalIgnoreCase)) { throw "[FAIL] CMakeCache compiler path provenance mismatch" }
          }
          foreach ($key in @("plugin_path","helper_user_o","runtime_user_o","helper_kernel_o")) {
            $resolved = (Resolve-Path -LiteralPath $kv[$key]).Path
            if (-not (Test-UnderRoot $resolved $outputRoot.Path)) { throw "[FAIL] output path escaped sample_suite_inputs for $key" }
          }
          foreach ($key in @("plugin_build_command","helper_user_compile_command","runtime_user_compile_command","helper_kernel_compile_command")) {
            $resolved = (Resolve-Path -LiteralPath $kv[$key]).Path
            if (-not (Test-UnderRoot $resolved $commandsRoot.Path)) { throw "[FAIL] command sidecar escaped commands dir for $key" }
          }
          if (!(Test-Path -LiteralPath (Join-Path $llvmDir "LLVMConfig.cmake") -PathType Leaf)) { throw "[FAIL] llvm_dir missing LLVMConfig.cmake" }
          if (-not $kv["plugin_path"].EndsWith("eippf_protection_suite_pass.dll")) { throw "[FAIL] plugin_path mismatch" }
          if ($kv["suite_summary"] -ne "ProtectionAnchor,StringProtection,IATMinimization,MBAObfuscation,CFFObfuscation") { throw "[FAIL] suite_summary mismatch" }
          if (-not $kv["helper_user_o"].EndsWith("string_token_runtime.windows.user.obj")) { throw "[FAIL] helper_user_o mismatch" }
          if (-not $kv["runtime_user_o"].EndsWith("runtime_core.windows.user.obj")) { throw "[FAIL] runtime_user_o mismatch" }
          if (-not $kv["helper_kernel_o"].EndsWith("string_token_runtime.windows.sys.obj")) { throw "[FAIL] helper_kernel_o mismatch" }
          foreach ($pair in @(@("plugin_build_command",$kv["plugin_path"]), @("helper_user_compile_command",$kv["helper_user_o"]), @("runtime_user_compile_command",$kv["runtime_user_o"]), @("helper_kernel_compile_command",$kv["helper_kernel_o"]))) {
            $text = Get-Content $kv[$pair[0]] -Raw
            if (Test-ForbiddenLinkerControls $text) { throw "[FAIL] sidecar is not fully expanded: $($pair[0])" }
            if ($text -notmatch [regex]::Escape($compilerPath)) { throw "[FAIL] sidecar missing compiler path: $($pair[0])" }
            if ($text -notmatch [regex]::Escape($pair[1])) { throw "[FAIL] sidecar missing output/input path: $($pair[0])" }
            if ($pair[0] -ne "plugin_build_command") {
              $expectedSource = if ($pair[0] -eq "runtime_user_compile_command") { $runtimeSource } else { $helperSource }
              if ($text -notmatch [regex]::Escape($expectedSource)) { throw "[FAIL] helper/runtime compile missing source path: $($pair[0])" }
              if ($text -notmatch [regex]::Escape($sharedInclude) -or $text -notmatch [regex]::Escape($runtimeInclude)) { throw "[FAIL] helper compile missing include roots: $($pair[0])" }
              if ($text -notmatch '/GR-' -or $text -notmatch '/EHs-c-') { throw "[FAIL] helper compile missing no-rtti/no-exception flags: $($pair[0])" }
              if ($pair[0] -eq "helper_user_compile_command" -and $text -match '/GS-') { throw "[FAIL] user helper unexpectedly disabled GS" }
              if ($pair[0] -eq "runtime_user_compile_command" -and $text -match '/GS-') { throw "[FAIL] user runtime unexpectedly disabled GS" }
              if (($pair[0] -eq "helper_user_compile_command" -or $pair[0] -eq "runtime_user_compile_command") -and ($text -notmatch '/Gy' -or $text -notmatch '/Gw')) { throw "[FAIL] user-mode compile missing section GC flags: $($pair[0])" }
              if ($pair[0] -eq "helper_kernel_compile_command" -and ($text -notmatch '/GS-' -or $text -notmatch '/Zl')) { throw "[FAIL] kernel helper missing kernel-safe flags" }
            }
            if ($pair[0] -eq "plugin_build_command" -and $text -notmatch [regex]::Escape($expectedLlvmDir)) { throw "[FAIL] plugin_build_command missing LLVM_DIR" }
          }
          foreach ($quad in @(@("windows_exe_link_inputs","windows_exe_link_command",@($kv["helper_user_o"],$kv["runtime_user_o"])), @("windows_dll_link_inputs","windows_dll_link_command",@($kv["helper_user_o"],$kv["runtime_user_o"])), @("windows_sys_link_inputs","windows_sys_link_command",@($kv["helper_kernel_o"])))) {
            $entries = @($kv[$quad[0]].Split(';') | Where-Object { $_ -ne "" })
            if ($entries.Count -ne $quad[2].Count) { throw "[FAIL] unexpected link input count for $($quad[0])" }
            $resolvedEntries = @()
            for ($i = 0; $i -lt $entries.Count; $i++) {
              if (-not [System.IO.Path]::IsPathRooted($entries[$i])) { throw "[FAIL] non-absolute link input for $($quad[0])" }
              if (!(Test-Path -LiteralPath $entries[$i])) { throw "[FAIL] missing link input for $($quad[0])" }
              $resolved = (Resolve-Path -LiteralPath $entries[$i]).Path
              if (-not (Test-UnderRoot $resolved $outputRoot.Path)) { throw "[FAIL] link input escaped sample_suite_inputs for $($quad[0])" }
              if (-not ([System.IO.Path]::GetFullPath($resolved).Equals([System.IO.Path]::GetFullPath((Resolve-Path -LiteralPath $quad[2][$i]).Path), [System.StringComparison]::OrdinalIgnoreCase))) { throw "[FAIL] link input binding mismatch for $($quad[0]) index $i" }
              if ($entries[$i] -match 'eippf_string_token_runtime\.(lib|a)$') { throw "[FAIL] legacy runtime archive leaked into $($quad[0])" }
              $resolvedEntries += $resolved
            }
            $commandPath = (Resolve-Path -LiteralPath $kv[$quad[1]]).Path
            if (-not (Test-UnderRoot $commandPath $commandsRoot.Path)) { throw "[FAIL] link command escaped commands dir for $($quad[1])" }
            $commandText = Get-Content $commandPath -Raw
            if (Test-ForbiddenLinkerControls $commandText) { throw "[FAIL] sidecar is not fully expanded: $($quad[1])" }
            foreach ($resolved in $resolvedEntries) {
              if ($commandText -notmatch [regex]::Escape($resolved)) { throw "[FAIL] link command missing explicit input for $($quad[1])" }
            }
            if ($commandText -match 'eippf_string_token_runtime\.(lib|a)') { throw "[FAIL] legacy runtime archive leaked into $($quad[1])" }
            $explicitInputs = @(Get-ExplicitObjectArchiveInputs $commandText)
            $expectedInputs = @($resolvedEntries | ForEach-Object { [System.IO.Path]::GetFullPath($_) })
            $unexpected = @($explicitInputs | Where-Object {
              $candidate = [System.IO.Path]::GetFullPath($_)
              -not ($expectedInputs | Where-Object { $_.Equals($candidate, [System.StringComparison]::OrdinalIgnoreCase) })
            })
            if ($unexpected.Count -ne 0) { throw "[FAIL] unexpected explicit object/archive input for $($quad[1])" }
            foreach ($expectedInput in $expectedInputs) {
              $expectedMentions = @($explicitInputs | Where-Object { [System.IO.Path]::GetFullPath($_).Equals($expectedInput, [System.StringComparison]::OrdinalIgnoreCase) }).Count
              if ($expectedMentions -ne 1) { throw "[FAIL] explicit input set mismatch for $($quad[1])" }
            }
          }
      - name: Upload Windows Samples
        uses: actions/upload-artifact@v4
        with:
          name: sample-suite-windows
          path: sample_suite_inputs
          if-no-files-found: error

  build-macos-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LLVM Build Toolchain
        shell: bash
        run: |
          set -euo pipefail
          brew update
          brew install llvm@18 ninja

      - name: Preflight macOS LLVM Environment Exports
        shell: bash
        run: |
          set -euo pipefail
          LLVM_PREFIX="$(brew --prefix llvm@18)"
          echo "${LLVM_PREFIX}/bin" >> "${GITHUB_PATH}"
          echo "EIPPF_ALLOWED_LLVM_ROOT=${LLVM_PREFIX}" >> "${GITHUB_ENV}"
          echo "LLVM_DIR=${LLVM_PREFIX}/lib/cmake/llvm" >> "${GITHUB_ENV}"
          echo "EIPPF_CLANG=${LLVM_PREFIX}/bin/clang" >> "${GITHUB_ENV}"
          echo "EIPPF_CLANGXX=${LLVM_PREFIX}/bin/clang++" >> "${GITHUB_ENV}"

      - name: Build iOS Mach-O Sample
        shell: bash
        run: |
          set -euo pipefail
          chmod +x core/tools/sample_suite/build_macos_ios.sh
          core/tools/sample_suite/build_macos_ios.sh \
            "${GITHUB_WORKSPACE}/sample_suite_inputs"

      - name: Validate macOS iOS Toolchain Report
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import os
          import re
          import shlex
          import subprocess
          report = Path("sample_suite_inputs/toolchain_reports/macos_ios.txt")
          if not report.is_file():
              raise SystemExit(f"[FAIL] missing report: {report}")
          kv = {}
          for raw in report.read_text(encoding="ascii").splitlines():
              parts = raw.split("=", 1)
              if len(parts) != 2:
                  raise SystemExit(f"[FAIL] malformed report line: {raw}")
              key, value = parts
              if key in kv:
                  raise SystemExit(f"[FAIL] duplicate key: {key}")
              kv[key] = value
          required = [
              "platform", "ios_target_source", "host_compiler_path", "host_compiler_version_first_line",
              "ios_target_compiler_path", "ios_target_compiler_version_first_line",
              "ios_link_driver_path", "ios_link_driver_version_first_line", "llvm_dir",
              "plugin_path", "suite_summary", "ios_user_helper_o", "ios_user_runtime_o", "ios_protected_o", "plugin_build_log", "plugin_build_command", "plugin_link_command",
              "ios_user_helper_compile_command", "ios_user_runtime_compile_command", "ios_protected_compile_command",
              "ios_link_inputs", "ios_link_command",
              "ios_target", "ios_isysroot",
          ]
          for key in required:
              if key not in kv:
                  raise SystemExit(f"[FAIL] missing key: {key}")
          if set(kv) != set(required):
              raise SystemExit("[FAIL] key set mismatch")
          if kv["platform"] != "macos_ios":
              raise SystemExit("[FAIL] platform mismatch")
          if kv["ios_target_source"] != "xcrun":
              raise SystemExit("[FAIL] ios_target_source mismatch")
          for key, value in kv.items():
              if key in {"platform", "ios_target_source", "ios_target", "ios_link_inputs"} or key.endswith("_version_first_line"):
                  continue
              if not Path(value).is_absolute():
                  raise SystemExit(f"[FAIL] non-absolute path for {key}")
              if not Path(value).exists():
                  raise SystemExit(f"[FAIL] missing path for {key}")
          llvm_prefix = Path(os.environ["EIPPF_ALLOWED_LLVM_ROOT"]).resolve()
          output_root = (Path.cwd() / "sample_suite_inputs").resolve()
          commands_root = (output_root / "toolchain_reports" / "commands").resolve()
          pass_plugin_header = (llvm_prefix / "include" / "llvm" / "Passes" / "PassPlugin.h").resolve()
          llvm_config = (llvm_prefix / "lib" / "cmake" / "llvm" / "LLVMConfig.cmake").resolve()
          repo_root = Path.cwd().resolve()
          wrapper_path = (repo_root / "core" / "wrapper" / "eippf_cc.py").resolve()
          helper_source = repo_root / "core" / "runtime" / "src" / "string_token_runtime.cpp"
          runtime_source = repo_root / "core" / "runtime" / "src" / "EippfRuntime.cpp"
          ios_source = repo_root / "core" / "tests" / "sample_suite" / "sources" / "ios" / "ios_macho_main.c"
          shared_include = repo_root / "core" / "include"
          runtime_include = repo_root / "core" / "runtime" / "include"
          def assert_under(path: Path, root: Path, label: str) -> None:
              resolved = path.resolve()
              root_resolved = root.resolve()
              try:
                  resolved.relative_to(root_resolved)
              except ValueError as exc:
                  raise SystemExit(f"[FAIL] {label} escaped allowed root") from exc
          def has_forbidden_linker_controls(text: str) -> bool:
              tokens = shlex.split(text, posix=True)
              for index, token in enumerate(tokens):
                  if token.startswith("@"):
                      return True
                  if token in {"-T", "--script"}:
                      return True
                  if token.startswith("-T") or token.startswith("--script="):
                      return True
                  if token.startswith("-Wl,@") or token == "-Wl,-T" or token.startswith("-Wl,-T") or token == "-Wl,--script" or token.startswith("-Wl,--script"):
                      return True
                  if token == "-Xlinker" and index + 1 < len(tokens):
                      nxt = tokens[index + 1]
                      if nxt in {"-T", "--script"} or nxt.startswith("-T") or nxt.startswith("--script="):
                          return True
                  if token.startswith("-Xlinker=-T") or token.startswith("-Xlinker=--script"):
                      return True
              return False
          def explicit_object_archive_inputs(text: str) -> list[Path]:
              inputs: list[Path] = []
              for token in shlex.split(text, posix=True):
                  if re.search(r"\.(?:o|obj|a|lib)$", token):
                      path = Path(token)
                      if not path.is_absolute():
                          path = (Path.cwd() / path).resolve()
                      else:
                          path = path.resolve()
                      inputs.append(path)
              return inputs
          def command_payload_tokens(text: str) -> list[str]:
              tokens = shlex.split(text, posix=True)
              if "--" in tokens:
                  return tokens[tokens.index("--") + 1 :]
              return tokens
          def extract_flag_value_paths(command_text: str, flag: str) -> list[Path]:
              tokens = command_payload_tokens(command_text)
              results: list[Path] = []
              index = 0
              while index < len(tokens):
                  token = tokens[index]
                  if token == flag:
                      if index + 1 < len(tokens):
                          results.append(Path(tokens[index + 1]))
                          index += 2
                          continue
                      index += 1
                      continue
                  if token.startswith(f"{flag}="):
                      results.append(Path(token[len(flag) + 1 :]))
                  index += 1
              return results
          def assert_flag_path_matches_expected(
              command_text: str,
              command_key: str,
              flag: str,
              expected_path: Path,
              fail_msg: str,
          ) -> None:
              candidates = extract_flag_value_paths(command_text, flag)
              if len(candidates) != 1:
                  raise SystemExit(fail_msg)
              candidate = candidates[0]
              if not candidate.is_absolute():
                  raise SystemExit(fail_msg)
              if not candidate.exists():
                  raise SystemExit(fail_msg)
              try:
                  is_same_path = candidate.samefile(expected_path)
              except (OSError, FileNotFoundError):
                  is_same_path = candidate.resolve(strict=False) == expected_path.resolve(strict=False)
              if not is_same_path:
                  raise SystemExit(fail_msg)
          def extract_cmake_define_paths(text: str, define_key: str) -> list[Path]:
              tokens = shlex.split(text, posix=True)
              pattern = re.compile(rf"^-D{re.escape(define_key)}(?::[^=]+)?=(.+)$")
              results: list[Path] = []
              for token in tokens:
                  match = pattern.match(token)
                  if match is not None:
                      results.append(Path(match.group(1)))
              return results
          def assert_cmake_define_matches_expected(
              text: str,
              define_key: str,
              expected_path: Path,
              fail_msg: str,
          ) -> None:
              candidates = extract_cmake_define_paths(text, define_key)
              if len(candidates) != 1:
                  raise SystemExit(fail_msg)
              candidate = candidates[0]
              if not candidate.is_absolute():
                  raise SystemExit(fail_msg)
              if not candidate.exists():
                  raise SystemExit(fail_msg)
              try:
                  is_same_path = candidate.samefile(expected_path)
              except (OSError, FileNotFoundError):
                  is_same_path = candidate.resolve(strict=False) == expected_path.resolve(strict=False)
              if not is_same_path:
                  raise SystemExit(fail_msg)
          def paths_identical(left: Path, right: Path) -> bool:
              try:
                  return left.samefile(right)
              except (OSError, FileNotFoundError):
                  return left.resolve(strict=False) == right.resolve(strict=False)
          def assert_command_driver_path_matches_expected(
              command_text: str,
              command_key: str,
              expected_path: Path,
              fail_msg: str,
          ) -> Path:
              tokens = command_payload_tokens(command_text)
              if not tokens:
                  raise SystemExit(fail_msg)
              candidate = Path(tokens[0])
              if not candidate.is_absolute():
                  raise SystemExit(fail_msg)
              if not candidate.exists():
                  raise SystemExit(fail_msg)
              if not paths_identical(candidate, expected_path):
                  raise SystemExit(fail_msg)
              return candidate
          def assert_wrapper_option_path_matches_expected(
              command_text: str,
              command_key: str,
              option: str,
              expected_path: Path,
              fail_msg: str,
          ) -> Path:
              tokens = shlex.split(command_text, posix=True)
              if "--" in tokens:
                  wrapper_tokens = tokens[:tokens.index("--")]
              else:
                  wrapper_tokens = tokens
              candidates: list[Path] = []
              expect_value = False
              for token in wrapper_tokens:
                  if expect_value:
                      candidates.append(Path(token))
                      expect_value = False
                      continue
                  if token == option:
                      expect_value = True
                      continue
                  if token.startswith(f"{option}="):
                      candidates.append(Path(token[len(option) + 1 :]))
              if len(candidates) != 1:
                  raise SystemExit(fail_msg)
              candidate = candidates[0]
              if not candidate.is_absolute():
                  raise SystemExit(fail_msg)
              if not candidate.exists():
                  raise SystemExit(fail_msg)
              if not paths_identical(candidate, expected_path):
                  raise SystemExit(fail_msg)
              return candidate
          def enforce_link_language_token_state_machine(
              command_text: str,
              command_key: str,
              source_path: Path,
              helper_path: Path,
          ) -> None:
              tokens = command_payload_tokens(command_text)
              source_token = str(source_path.resolve())
              helper_token = str(helper_path.resolve())
              explicit_language: str | None = None
              seen_x_c = False
              seen_source_after_x_c = False
              seen_x_none = False
              index = 0
              while index < len(tokens):
                  token = tokens[index]
                  language: str | None = None
                  if token == "-x":
                      if index + 1 >= len(tokens):
                          raise SystemExit(f"[FAIL] malformed -x token in {command_key}")
                      language = tokens[index + 1]
                      index += 2
                  elif token.startswith("-x") and len(token) > 2:
                      language = token[2:]
                      index += 1
                  else:
                      index += 1
                  if language is not None:
                      if language == "c++":
                          raise SystemExit(f"[FAIL] forbidden language token -x c++ in {command_key}")
                      explicit_language = language
                      if language == "c":
                          seen_x_c = True
                      if language == "none":
                          seen_x_none = True
                      continue
                  if token == source_token:
                      if not seen_x_c:
                          raise SystemExit(f"[FAIL] source token must follow -x c in {command_key}")
                      seen_source_after_x_c = True
                  is_object_or_archive = re.search(r"\.(?:o|obj|a|lib)$", token) is not None
                  if is_object_or_archive and explicit_language not in {None, "none"}:
                      raise SystemExit(f"[FAIL] object/archive token under -x {explicit_language} in {command_key}: {token}")
                  if token == helper_token and not seen_x_none:
                      raise SystemExit(f"[FAIL] helper input requires -x none before it in {command_key}")
              if not seen_x_c:
                  raise SystemExit(f"[FAIL] missing -x c in {command_key}")
              if not seen_source_after_x_c:
                  raise SystemExit(f"[FAIL] missing source token after -x c in {command_key}")
          def enforce_compile_only_language_token_state_machine(
              command_text: str,
              command_key: str,
              source_path: Path,
              output_path: Path,
          ) -> None:
              tokens = command_payload_tokens(command_text)
              source_token = str(source_path.resolve())
              output_token = str(output_path.resolve())
              explicit_language: str | None = None
              seen_x_c = False
              seen_source_after_x_c = False
              pending_source_after_x_c = False
              seen_compile_only = False
              seen_output_after_o = False
              index = 0
              while index < len(tokens):
                  token = tokens[index]
                  if pending_source_after_x_c:
                      if token != source_token:
                          raise SystemExit(f"[FAIL] source token must immediately follow -x c in {command_key}")
                      seen_source_after_x_c = True
                      pending_source_after_x_c = False
                      index += 1
                      continue
                  if token == "-c":
                      seen_compile_only = True
                      index += 1
                      continue
                  language: str | None = None
                  if token == "-x":
                      if index + 1 >= len(tokens):
                          raise SystemExit(f"[FAIL] malformed -x token in {command_key}")
                      language = tokens[index + 1]
                      index += 2
                  elif token.startswith("-x") and len(token) > 2:
                      language = token[2:]
                      index += 1
                  else:
                      if token == "-o":
                          if index + 1 >= len(tokens):
                              raise SystemExit(f"[FAIL] missing -o value in {command_key}")
                          output_candidate = Path(tokens[index + 1])
                          if not output_candidate.is_absolute():
                              output_candidate = (Path.cwd() / output_candidate).resolve()
                          else:
                              output_candidate = output_candidate.resolve()
                          if output_candidate != output_path.resolve():
                              raise SystemExit(f"[FAIL] output path mismatch for {command_key}")
                          seen_output_after_o = True
                          index += 2
                          continue
                      if token.startswith("-o") and len(token) > 2:
                          output_candidate = Path(token[2:])
                          if not output_candidate.is_absolute():
                              output_candidate = (Path.cwd() / output_candidate).resolve()
                          else:
                              output_candidate = output_candidate.resolve()
                          if output_candidate != output_path.resolve():
                              raise SystemExit(f"[FAIL] output path mismatch for {command_key}")
                          seen_output_after_o = True
                          index += 1
                          continue
                      index += 1
                  if language is not None:
                      if language == "c++":
                          raise SystemExit(f"[FAIL] forbidden language token -x c++ in {command_key}")
                      explicit_language = language
                      if language == "c":
                          seen_x_c = True
                          pending_source_after_x_c = True
                      continue
                  if token == source_token:
                      if not seen_x_c:
                          raise SystemExit(f"[FAIL] source token must follow -x c in {command_key}")
                      seen_source_after_x_c = True
                  is_object_or_archive = re.search(r"\.(?:o|obj|a|lib)$", token) is not None
                  if is_object_or_archive:
                      token_path = Path(token)
                      if not token_path.is_absolute():
                          token_path = (Path.cwd() / token_path).resolve()
                      else:
                          token_path = token_path.resolve()
                      if token_path == output_path.resolve():
                          continue
                      if explicit_language not in {None, "none"}:
                          raise SystemExit(f"[FAIL] object/archive token under -x {explicit_language} in {command_key}: {token}")
              if not seen_compile_only:
                  raise SystemExit(f"[FAIL] missing -c in {command_key}")
              if not seen_x_c:
                  raise SystemExit(f"[FAIL] missing -x c in {command_key}")
              if pending_source_after_x_c:
                  raise SystemExit(f"[FAIL] missing immediate source token after -x c in {command_key}")
              if not seen_source_after_x_c:
                  raise SystemExit(f"[FAIL] missing source token after -x c in {command_key}")
              if not seen_output_after_o:
                  raise SystemExit(f"[FAIL] missing -o output in {command_key}")
          xcrun_clangxx = Path(subprocess.check_output(["xcrun", "--sdk", "iphonesimulator", "--find", "clang++"], text=True).strip()).resolve()
          xcrun_clang = Path(subprocess.check_output(["xcrun", "--sdk", "iphonesimulator", "--find", "clang"], text=True).strip()).resolve()
          ios_sdk = Path(subprocess.check_output(["xcrun", "--sdk", "iphonesimulator", "--show-sdk-path"], text=True).strip()).resolve()
          if not pass_plugin_header.is_file():
              raise SystemExit("[FAIL] PassPlugin.h missing under allowed LLVM root")
          if not llvm_config.is_file():
              raise SystemExit("[FAIL] LLVMConfig.cmake missing under allowed LLVM root")
          assert_under(Path(kv["host_compiler_path"]), llvm_prefix / "bin", "host_compiler")
          if "clang version 18" not in kv["host_compiler_version_first_line"]:
              raise SystemExit("[FAIL] host compiler version mismatch")
          if Path(kv["host_compiler_path"]).name != "clang++":
              raise SystemExit("[FAIL] host_compiler_path mismatch")
          if Path(kv["ios_target_compiler_path"]).resolve() != xcrun_clangxx:
              raise SystemExit("[FAIL] ios_target_compiler provenance mismatch")
          if Path(kv["ios_target_compiler_path"]).name != "clang++":
              raise SystemExit("[FAIL] ios_target_compiler_path mismatch")
          if Path(kv["ios_link_driver_path"]).resolve() != xcrun_clang:
              raise SystemExit("[FAIL] ios_link_driver provenance mismatch")
          if Path(kv["ios_link_driver_path"]).name != "clang":
              raise SystemExit("[FAIL] ios_link_driver_path mismatch")
          if Path(kv["llvm_dir"]).resolve() != (llvm_prefix / "lib" / "cmake" / "llvm").resolve():
