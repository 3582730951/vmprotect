              raise SystemExit("[FAIL] plugin_path mismatch")
          if kv["suite_summary"] != "ProtectionAnchor,StringProtection,IATMinimization,MBAObfuscation,CFFObfuscation":
              raise SystemExit("[FAIL] suite_summary mismatch")
          assert_under(Path(kv["ios_user_helper_o"]), output_root, "ios_user_helper_o")
          if Path(kv["ios_user_helper_o"]).name != "string_token_runtime.ios.user.o":
              raise SystemExit("[FAIL] ios_user_helper_o mismatch")
          assert_under(Path(kv["ios_user_runtime_o"]), output_root, "ios_user_runtime_o")
          if Path(kv["ios_user_runtime_o"]).name != "runtime_core.ios.user.o":
              raise SystemExit("[FAIL] ios_user_runtime_o mismatch")
          assert_under(Path(kv["ios_protected_o"]), output_root, "ios_protected_o")
          if Path(kv["ios_protected_o"]).name != "ios_macho.protected.o":
              raise SystemExit("[FAIL] ios_protected_o mismatch")
          plugin_build_log = Path(kv["plugin_build_log"])
          if not plugin_build_log.is_absolute():
              raise SystemExit("[FAIL] non-absolute path for plugin_build_log")
          if not plugin_build_log.exists():
              raise SystemExit("[FAIL] missing path for plugin_build_log")
          assert_under(plugin_build_log, commands_root, "plugin_build_log")
          plugin_build_sidecar = Path(kv["plugin_build_command"])
          assert_under(plugin_build_sidecar, commands_root, "plugin_build_command")
          plugin_build_text = plugin_build_sidecar.read_text(encoding="ascii")
          if has_forbidden_linker_controls(plugin_build_text):
              raise SystemExit("[FAIL] sidecar is not fully expanded: plugin_build_command")
          assert_cmake_define_matches_expected(
              plugin_build_text,
