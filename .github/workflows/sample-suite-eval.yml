          if paths_identical(compiler_path, Path(kv["ios_link_driver_path"])):
              raise SystemExit("[FAIL] ios_protected_compile_command must not use final link driver")
          if str(wrapper_path) not in protected_compile_text:
              raise SystemExit("[FAIL] ios_protected_compile_command missing wrapper path")
          if str(ios_source) not in protected_compile_text:
              raise SystemExit("[FAIL] ios_protected_compile_command missing source path")
          if "-target arm64-apple-ios17.0-simulator" not in protected_compile_text:
              raise SystemExit("[FAIL] ios_protected_compile_command missing target")
          assert_flag_path_matches_expected(protected_compile_text, "ios_protected_compile_command", "-isysroot", Path(kv["ios_isysroot"]), "[FAIL] ios_protected_compile_command missing isysroot")
          if str(Path(kv["ios_user_helper_o"]).resolve()) in protected_compile_text or str(Path(kv["ios_user_runtime_o"]).resolve()) in protected_compile_text:
              raise SystemExit("[FAIL] ios_protected_compile_command must not include helper/runtime object")
          if "-shared" in protected_compile_text:
              raise SystemExit("[FAIL] ios_protected_compile_command must not include -shared")
          if str(Path(kv["ios_protected_o"]).resolve()) not in protected_compile_text:
              raise SystemExit("[FAIL] ios_protected_compile_command missing protected object output")
          protected_compile_payload_tokens = command_payload_tokens(protected_compile_text)
          if "-O0" not in protected_compile_payload_tokens:
              raise SystemExit("[FAIL] ios_protected_compile_command missing -O0")
          for forbidden_opt in ["-O1", "-O2", "-O3", "-Ofast"]:
              if forbidden_opt in protected_compile_payload_tokens:
                  raise SystemExit(f"[FAIL] ios_protected_compile_command contains forbidden optimization flag: {forbidden_opt}")
          enforce_compile_only_language_token_state_machine(
              protected_compile_text,
