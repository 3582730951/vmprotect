          )
          if str(protected_entry.resolve()) not in command_text:
              raise SystemExit("[FAIL] ios_link_command missing protected input")
          if str(helper_entry.resolve()) not in command_text:
              raise SystemExit("[FAIL] ios_link_command missing helper input")
          if str(runtime_entry.resolve()) not in command_text:
              raise SystemExit("[FAIL] ios_link_command missing runtime input")
          if "-target arm64-apple-ios17.0-simulator" not in command_text:
              raise SystemExit("[FAIL] ios_link_command missing target")
          assert_flag_path_matches_expected(command_text, "ios_link_command", "-isysroot", Path(kv["ios_isysroot"]), "[FAIL] ios_link_command missing isysroot")
          if str(ios_source) in command_text:
              raise SystemExit("[FAIL] ios_link_command must not include source path")
          if str(wrapper_path) in command_text:
              raise SystemExit("[FAIL] ios_link_command must not include wrapper path")
          if str(Path(kv["plugin_path"]).resolve()) in command_text:
              raise SystemExit("[FAIL] ios_link_command must not include plugin path")
          if "-fpass-plugin" in command_text:
              raise SystemExit("[FAIL] ios_link_command must not include -fpass-plugin")
          if "eippf_string_token_runtime." in command_text:
              raise SystemExit("[FAIL] legacy runtime archive leaked into ios_link_command")
          explicit_inputs = explicit_object_archive_inputs(command_text)
          if len(explicit_inputs) != 3:
              raise SystemExit("[FAIL] explicit object/archive input count mismatch for ios_link_command")
          if explicit_inputs[0] != protected_entry.resolve() or explicit_inputs[1] != helper_entry.resolve() or explicit_inputs[2] != runtime_entry.resolve():
              raise SystemExit("[FAIL] explicit object/archive input order mismatch for ios_link_command")
          PY

      - name: Upload macOS iOS Samples
        uses: actions/upload-artifact@v4
        with:
          name: sample-suite-macos-ios
          path: sample_suite_inputs
          if-no-files-found: error

  protect-and-evaluate:
    runs-on: ubuntu-latest
    needs:
      - build-linux-android
      - build-windows
      - build-macos-ios
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux Android Samples
        uses: actions/download-artifact@v4
        with:
          name: sample-suite-linux-android
          path: sample_suite_downloaded

      - name: Download Windows Samples
        uses: actions/download-artifact@v4
        with:
          name: sample-suite-windows
          path: sample_suite_downloaded

      - name: Download macOS iOS Samples
        uses: actions/download-artifact@v4
        with:
          name: sample-suite-macos-ios
          path: sample_suite_downloaded

      - name: Validate Downloaded Toolchain Reports
        shell: bash
        run: |
          set -euo pipefail
          test -f sample_suite_downloaded/toolchain_reports/windows.txt
          test -f sample_suite_downloaded/toolchain_reports/linux_android.txt
          test -f sample_suite_downloaded/toolchain_reports/macos_ios.txt

      - name: Install Build Dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y llvm-18 llvm-18-dev llvm-18-tools clang-18 libclang-cpp18-dev
          python3 -m pip install --upgrade pip cmake ninja
          echo "/usr/lib/llvm-18/bin" >> "${GITHUB_PATH}"
          echo "LLVM_DIR=/usr/lib/llvm-18/lib/cmake/llvm" >> "${GITHUB_ENV}"

      - name: Build Protection Binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${GITHUB_WORKSPACE}/build_sample_suite/pass_plugins"
          cmake -S core -B build_sample_suite -G Ninja \
            -DLLVM_DIR=/usr/lib/llvm-18/lib/cmake/llvm \
            -DCMAKE_LIBRARY_OUTPUT_DIRECTORY="${GITHUB_WORKSPACE}/build_sample_suite/pass_plugins"
          cmake --build build_sample_suite -j 4 --target \
            eippf_protection_suite_pass \
            eippf_post_link_mutator \
            eippf_dex_toolchain \
            eippf_script_guard
          test -f "${GITHUB_WORKSPACE}/build_sample_suite/pass_plugins/eippf_protection_suite_pass.so"

      - name: Protect Reverse Evaluate
        shell: bash
        run: |
          set -euo pipefail
          python3 core/tools/sample_suite/protect_and_evaluate.py \
            --manifest core/tests/sample_suite/sample_manifest.json \
            --input-root sample_suite_downloaded \
            --build-root build_sample_suite \
            --output-root sample_suite_evidence

      - name: Validate Static Evidence Layout
        shell: bash
        run: |
          set -euo pipefail
          required=(
            sample_manifest.json
            original
            protected
            signed_policy
            manifests
            audit
            reverse
            report.html
            summary.json
            tool_versions.json
            logs
          )
          for entry in "${required[@]}"; do
            if [ ! -e "sample_suite_evidence/${entry}" ]; then
              echo "[FAIL] missing evidence entry: ${entry}" >&2
              exit 1
            fi
          done

      - name: Upload Static Evidence
        uses: actions/upload-artifact@v4
        with:
          name: sample-suite-static-evidence
          path: sample_suite_evidence
          if-no-files-found: error

  collect-linux-runtime-probes:
    runs-on: ubuntu-latest
    needs:
      - protect-and-evaluate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Static Evidence
        uses: actions/download-artifact@v4
        with:
          name: sample-suite-static-evidence
          path: sample_suite_evidence

      - name: Install Build Dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y llvm-18 llvm-18-dev llvm-18-tools clang-18 libclang-cpp18-dev
          python3 -m pip install --upgrade pip cmake ninja
          echo "/usr/lib/llvm-18/bin" >> "${GITHUB_PATH}"
          echo "LLVM_DIR=/usr/lib/llvm-18/lib/cmake/llvm" >> "${GITHUB_ENV}"

      - name: Build Linux Host Probe
        shell: bash
        run: |
          set -euo pipefail
          cmake -S core -B build_sample_suite -G Ninja \
            -DLLVM_DIR=/usr/lib/llvm-18/lib/cmake/llvm
          cmake --build build_sample_suite -j 4 --target eippf_redteam_host_probe
          probe_tool="$(find "${GITHUB_WORKSPACE}/build_sample_suite" -type f -name eippf_redteam_host_probe | head -n 1)"
          test -n "${probe_tool}"
          echo "EIPPF_REDTEAM_HOST_PROBE=${probe_tool}" >> "${GITHUB_ENV}"

      - name: Run Linux Runtime Probes
        shell: bash
        run: |
          set -euo pipefail
          python3 core/tools/sample_suite/run_redteam_runtime_probes.py \
            --manifest core/tests/sample_suite/sample_manifest.json \
            --evidence-root sample_suite_evidence \
            --probe-tool "${EIPPF_REDTEAM_HOST_PROBE}" \
            --host linux \
            --output probe_results.json

      - name: Upload Linux Probe Results
        uses: actions/upload-artifact@v4
        with:
          name: sample-suite-linux-probe-results
          path: probe_results.json
          if-no-files-found: error

  collect-windows-runtime-probes:
    runs-on: windows-latest
    needs:
      - protect-and-evaluate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Static Evidence
        uses: actions/download-artifact@v4
        with:
          name: sample-suite-static-evidence
          path: sample_suite_evidence

      - name: Setup MSVC Environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Pinned LLVM 19.1.7
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $llvmVersion = "19.1.7"
          $archiveName = "clang+llvm-$llvmVersion-x86_64-pc-windows-msvc.tar.xz"
          $downloadUrl = "https://github.com/llvm/llvm-project/releases/download/llvmorg-$llvmVersion/$archiveName"
          $stagingRoot = Join-Path $env:RUNNER_TEMP "llvm-install-runtime-probe"
          $archivePath = Join-Path $env:RUNNER_TEMP $archiveName
          $extractRoot = Join-Path $stagingRoot "extract"
          $pinnedRoot = [System.IO.Path]::GetFullPath("C:\eippf\llvm19_1_7")
          if (Test-Path -LiteralPath $pinnedRoot) {
            Remove-Item -LiteralPath $pinnedRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Path $stagingRoot -Force | Out-Null
          New-Item -ItemType Directory -Path $extractRoot -Force | Out-Null
          Invoke-WebRequest -Uri $downloadUrl -OutFile $archivePath
          tar -xf $archivePath -C $extractRoot
          $payloadDir = Get-ChildItem -LiteralPath $extractRoot -Directory | Select-Object -First 1
          if ($null -eq $payloadDir) { throw "[FAIL] extracted LLVM archive is empty" }
          New-Item -ItemType Directory -Path (Split-Path -Parent $pinnedRoot) -Force | Out-Null
          Move-Item -LiteralPath $payloadDir.FullName -Destination $pinnedRoot
          if (!(Test-Path -LiteralPath (Join-Path $pinnedRoot "bin\\clang-cl.exe") -PathType Leaf)) {
            throw "[FAIL] pinned LLVM clang-cl.exe missing after extraction"
          }

      - name: Configure Pinned LLVM Contract
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $pinnedRoot = [System.IO.Path]::GetFullPath("C:\eippf\llvm19_1_7").TrimEnd('\')
          $llvmDir = Join-Path $pinnedRoot "lib\cmake\llvm"
          "LLVM_DIR=$llvmDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build Windows Host Probe
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          cmake -S core -B build_sample_suite -DLLVM_DIR="$env:LLVM_DIR"
          cmake --build build_sample_suite --config Release --target eippf_redteam_host_probe
          $probe = Get-ChildItem -Path build_sample_suite -Recurse -Filter eippf_redteam_host_probe.exe | Select-Object -First 1
          if (-not $probe) { throw "[FAIL] missing eippf_redteam_host_probe.exe" }
          "EIPPF_REDTEAM_HOST_PROBE_EXE=$($probe.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Run Windows Runtime Probes
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          python core/tools/sample_suite/run_redteam_runtime_probes.py `
            --manifest core/tests/sample_suite/sample_manifest.json `
            --evidence-root sample_suite_evidence `
            --probe-tool "$env:EIPPF_REDTEAM_HOST_PROBE_EXE" `
            --host windows `
            --output probe_results.json

      - name: Upload Windows Probe Results
        uses: actions/upload-artifact@v4
        with:
          name: sample-suite-windows-probe-results
          path: probe_results.json
          if-no-files-found: error

  collect-redteam-perf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y llvm-18 llvm-18-dev llvm-18-tools clang-18 libclang-cpp18-dev
          python3 -m pip install --upgrade pip cmake ninja
          echo "/usr/lib/llvm-18/bin" >> "${GITHUB_PATH}"
          echo "LLVM_DIR=/usr/lib/llvm-18/lib/cmake/llvm" >> "${GITHUB_ENV}"

      - name: Build Perf Smoke Targets
        shell: bash
        run: |
          set -euo pipefail
          cmake -S core -B build_sample_suite -G Ninja \
            -DLLVM_DIR=/usr/lib/llvm-18/lib/cmake/llvm
          cmake --build build_sample_suite -j 4 --target perf_smoke

      - name: Collect Perf Results
        shell: bash
        run: |
          set -euo pipefail
          python3 core/tools/redteam_perf_smoke_collect.py \
            --build-root build_sample_suite \
            --output perf_results.json

      - name: Upload Perf Results
        uses: actions/upload-artifact@v4
        with:
          name: sample-suite-perf-results
          path: perf_results.json
          if-no-files-found: error

  finalize-redteam-evidence:
    runs-on: ubuntu-latest
    needs:
      - protect-and-evaluate
      - collect-linux-runtime-probes
      - collect-windows-runtime-probes
      - collect-redteam-perf
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Static Evidence
        uses: actions/download-artifact@v4
        with:
          name: sample-suite-static-evidence
          path: sample_suite_evidence

      - name: Download Linux Probe Results
        uses: actions/download-artifact@v4
        with:
          name: sample-suite-linux-probe-results
          path: redteam_inputs/linux

      - name: Download Windows Probe Results
        uses: actions/download-artifact@v4
        with:
          name: sample-suite-windows-probe-results
          path: redteam_inputs/windows

      - name: Download Perf Results
        uses: actions/download-artifact@v4
        with:
          name: sample-suite-perf-results
          path: redteam_inputs/perf

      - name: Merge Probe Results
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          merged = {}
          for path in (
              Path("redteam_inputs/linux/probe_results.json"),
              Path("redteam_inputs/windows/probe_results.json"),
          ):
              payload = json.loads(path.read_text(encoding="utf-8"))
              if not isinstance(payload, dict):
                  raise SystemExit(f"[FAIL] probe payload must be object: {path}")
              overlap = set(merged).intersection(payload)
              if overlap:
                  raise SystemExit("[FAIL] duplicate probe sample ids: " + ",".join(sorted(overlap)))
              merged.update(payload)
          Path("sample_suite_evidence/probe_results.json").write_text(
              json.dumps(merged, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY
          cp redteam_inputs/perf/perf_results.json sample_suite_evidence/perf_results.json

      - name: Build Redteam Report
        shell: bash
        run: |
          set -euo pipefail
          python3 core/tools/redteam_harness.py \
            --summary sample_suite_evidence/summary.json \
            --output sample_suite_evidence/redteam.json \
            --denylist core/tools/lexical_anchor_denylist.txt \
            --probe-results sample_suite_evidence/probe_results.json \
            --perf-results sample_suite_evidence/perf_results.json
          python3 core/tools/sample_suite/gate_redteam_report.py \
            --report sample_suite_evidence/redteam.json

      - name: Validate Evidence Layout
        shell: bash
        run: |
          set -euo pipefail
          required=(
            sample_manifest.json
            original
            protected
            signed_policy
            manifests
            audit
            reverse
            report.html
            summary.json
            redteam.json
            probe_results.json
            perf_results.json
            tool_versions.json
            logs
          )
          for entry in "${required[@]}"; do
            if [ ! -e "sample_suite_evidence/${entry}" ]; then
              echo "[FAIL] missing evidence entry: ${entry}" >&2
              exit 1
            fi
          done

      - name: Upload Evidence
        uses: actions/upload-artifact@v4
        with:
          name: sample-suite-evidence
          path: sample_suite_evidence
          if-no-files-found: error
