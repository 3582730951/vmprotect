          if "eippf_string_token_runtime." in protected_entry.name or "eippf_string_token_runtime." in helper_entry.name or "eippf_string_token_runtime." in runtime_entry.name:
              raise SystemExit("[FAIL] legacy runtime archive leaked into ios_link_inputs")
          command_path = Path(kv["ios_link_command"])
